// ================================================================

let dpr=1;
function resize(){
  dpr=window.devicePixelRatio||1;
  // Read body padding (0 on Android, env(safe-area-inset-*) on iOS via .ios-safe class)
  // and subtract from the viewport so the letterboxed canvas fits inside the safe area.
  // On Android this is a no-op; on iOS notch/Dynamic Island devices it keeps
  // top/bottom UI (coins, settings gear, back buttons) visible above/below system chrome.
  const bs=getComputedStyle(document.body);
  const sit=parseFloat(bs.paddingTop)||0;
  const sib=parseFloat(bs.paddingBottom)||0;
  const sil=parseFloat(bs.paddingLeft)||0;
  const sir=parseFloat(bs.paddingRight)||0;
  const r=W/H;
  let cw=innerWidth-sil-sir,ch=innerHeight-sit-sib;
  if(cw/ch>r)cw=ch*r;else ch=cw/r;
  C.width=W*dpr;C.height=H*dpr;
  C.style.width=cw+'px';C.style.height=ch+'px';
  X.setTransform(dpr,0,0,dpr,0,0);
}
resize();addEventListener('resize',resize);

function loadSnd(name,src){
  const a=new Audio(src);

}

function playSnd(name){
  if(!sndOn)return;
  const a=sndCache[name];
  if(!a)return;
  // Clone to allow overlapping plays
  const c=a.cloneNode();
  c.volume=SND_VOL;
  c.play().catch(()=>{});
}

// Spawn a floating "+N" text for a coin reward — quick reward feedback
function spawnFloater(x,y,text,color){
  floaters.push({x,y,text,col:color||TH.star,t:0,dur:1.4});
}
function drawFloaters(){
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i];
    f.t+=1/60;
    if(f.t>=f.dur){floaters.splice(i,1);continue}
    const p=f.t/f.dur;
    const alpha=p<.15?p/.15:(p>.75?(1-p)/.25:1);
    const offY=-p*56;
    X.save();
    X.globalAlpha=max(0,alpha);
    txtP(f.text,f.x,f.y+offY,17,f.col);
    X.restore();
  }
}

// ================================================================
//  LEVEL GENERATION
// ================================================================
function seededRandom(seed){
  let s=seed;
  return function(){s=(s*16807)%2147483647;return(s-1)/2147483646};
}

// Generate a level using the REAL mechanic: arrows are multi-cell random-walk paths.
// Solvability is guaranteed by placing arrows in REVERSE solve order:
//   arrow[0] will be removed first, arrow[N-1] last. Place them backward:
//   first place arrow[N-1] (unconstrained), then arrow[N-2] needs a clear escape
//   past arrow[N-1], etc. At solve time, each arrow's escape path is clear of
//   the arrows that haven't been removed yet.
function generateLevel(lvl,customSeed){
  const rng=seededRandom(customSeed!=null?customSeed:(lvl*7919+31337));
  hintArrow=-1;hintTime=0;wrongTapsInLevel=0;
  hintUsedThisLevel=false;
  levelRevealT=0;
  updateStreak();

  // Unlimited levels. Difficulty ramps from level 1 to ~500, then stays at max.
  // Level 1 = gentle intro (8×11, ~15 arrows, big cells).
  // Level 500+ = extreme dense maze (34×48, ~300+ arrows, tiny cells).
  // Arrowheads ALWAYS visible — complexity comes from density, not hidden info.
  const p=min(1,(lvl-1)/499);
  const cols=floor(lrp(8,24,p)+.5);
  const rows=floor(lrp(11,32,p)+.5);
  const minLen=2; // always accept short arrows to fill tight spaces
  const maxLen=floor(lrp(8,30,p)+.5); // longer max = more space filled per arrow

  gridCols=cols;gridRows=rows;

  // occ[r][c] = arrow index that owns this cell, or -1
  const occ=[];
  for(let r=0;r<rows;r++){occ[r]=[];for(let c=0;c<cols;c++)occ[r][c]=-1}

  const placed=[];

  // Pass 1: long arrows with turns — the main visual content
  let safety=3000;
  while(safety-->0){
    const arrow=tryBuildArrow(occ,rows,cols,rng,minLen,maxLen);
    if(!arrow)break;
    for(const[r,c] of arrow.cells)occ[r][c]=placed.length;
    placed.push(arrow);
  }

  // Pass 2: short 2-3 cell fillers for medium gaps
  safety=3000;
  while(safety-->0){
    const arrow=tryBuildArrow(occ,rows,cols,rng,2,3);
    if(!arrow)break;
    for(const[r,c] of arrow.cells)occ[r][c]=placed.length;
    placed.push(arrow);
  }

  // Pass 3: 1-cell arrows with valid escape lines (guaranteed solvable)
  safety=3000;
  while(safety-->0){
    const arrow=tryBuildArrow(occ,rows,cols,rng,1,1);
    if(!arrow)break;
    for(const[r,c] of arrow.cells)occ[r][c]=placed.length;
    placed.push(arrow);
  }

  // Reverse so arrows[0] = first solved
  arrows=placed.reverse();
  for(const a of arrows)a.alive=true;

  minMoves=arrows.length;
  moves=0;
  timer=0;
  undosLeft=3;

  const key='ae_best_'+lvl;
  bestTime=+localStorage.getItem(key)||0;
}

// Build one arrow by EXHAUSTIVE candidate search.
// Special case: when minLen==1 && maxLen==1, build a single-cell arrow (just a
// head with a direction). Used in the gap-fill pass to plug isolated empties.
function tryBuildArrow(occ,rows,cols,rng,minLen,maxLen){
  const oneCell=(minLen===1&&maxLen===1);
  const candidates=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(occ[r][c]!==-1)continue;
      for(let d=0;d<4;d++){
        // For multi-cell arrows we need a free cell behind the head too.
        if(!oneCell){
          const bd=(d+2)%4;
          const br=r+DY[bd],bc=c+DX[bd];
          if(br<0||br>=rows||bc<0||bc>=cols)continue;
          if(occ[br][bc]!==-1)continue;
        }
        // Escape line from head to grid edge must be clear of existing arrows
        let clear=true;
        let cr=r+DY[d],cc=c+DX[d];
        while(cr>=0&&cr<rows&&cc>=0&&cc<cols){
          if(occ[cr][cc]!==-1){clear=false;break}
          cr+=DY[d];cc+=DX[d];
        }
        if(!clear)continue;
        // Score:
        //   +1.5 per neighbor already occupied → tight packing (cluster grows)
        //   -0.12 × Chebyshev distance from center → seed the first arrow near
        //   the middle of the grid so the cluster has room to expand outward
        //   in all directions (prevents hollow-center effect).
        let s=rng();
        for(let dd=0;dd<4;dd++){
          const nr=r+DY[dd],nc=c+DX[dd];
          if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&occ[nr][nc]!==-1)s+=1.5;
        }
        const cR=(rows-1)/2,cC=(cols-1)/2;
        const distCenter=max(abs(r-cR),abs(c-cC));
        s-=distCenter*.12;
        candidates.push({hr:r,hc:c,dir:d,s});
      }
    }
  }
  if(candidates.length===0)return null;
  candidates.sort((a,b)=>b.s-a.s);

  // Single-cell arrow shortcut: return the best candidate immediately
  if(oneCell){
    const best=candidates[0];
    return{cells:[[best.hr,best.hc]],dir:best.dir};
  }

  for(const cand of candidates){
    const{hr,hc,dir}=cand;
    const bd=(dir+2)%4;
    const br0=hr+DY[bd],bc0=hc+DX[bd];

    // Always target the maximum length. Growth stops naturally when all
    // neighbors are blocked, so short paths only happen in tight corners.
    const targetLen=maxLen;
    const cells=[[br0,bc0],[hr,hc]];
    const used=new Set();
    used.add(hr+','+hc);
    used.add(br0+','+bc0);
    let br=br0,bc=bc0;
    let lastStepDir=bd;
    let straightRun=1;

    while(cells.length<targetLen){
      const opts=[];
      for(let d=0;d<4;d++){
        const nr=br+DY[d],nc=bc+DX[d];
        if(nr<0||nr>=rows||nc<0||nc>=cols)continue;
        if(occ[nr][nc]!==-1)continue;
        if(used.has(nr+','+nc))continue;
        if(onEscapeLine(nr,nc,hr,hc,dir))continue;
        opts.push({r:nr,c:nc,d});
      }
      if(opts.length===0)break;
      const scored=opts.map(({r,c,d})=>{
        let s=rng();
        // Proximity bonus: +2.0 per occupied neighbor → paths hug existing arrows
        let occupied=[false,false,false,false];
        for(let dd=0;dd<4;dd++){
          const nr=r+DY[dd],nc=c+DX[dd];
          if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&occ[nr][nc]!==-1){
            s+=2.0;
            occupied[dd]=true;
          }
        }
        // Sandwich bonus: occupied on OPPOSITE sides → path threads a corridor
        if(occupied[0]&&occupied[2])s+=2.5; // right + left
        if(occupied[1]&&occupied[3])s+=2.5; // up + down
        // Turn bonus: prefer changing direction after 1-2 straight steps
        if(d!==lastStepDir)s+=1.6;
        else if(straightRun>=2)s-=1.2;
        return{cell:[r,c],d,s};
      });
      scored.sort((a,b)=>b.s-a.s);
      const pick=scored[0];
      cells.unshift(pick.cell);
      used.add(pick.cell[0]+','+pick.cell[1]);
      br=pick.cell[0];bc=pick.cell[1];
      if(pick.d===lastStepDir)straightRun++;else{straightRun=1;lastStepDir=pick.d}
    }

    if(cells.length>=minLen)return{cells,dir};
  }
  return null;
}

// Is (r,c) on the escape line of an arrow with head (hr,hc) in direction dir?
function onEscapeLine(r,c,hr,hc,dir){
  let cr=hr+DY[dir],cc=hc+DX[dir];
  while(cr>=0&&cr<gridRows&&cc>=0&&cc<gridCols){
    if(cr===r&&cc===c)return true;
    cr+=DY[dir];cc+=DX[dir];
  }
  return false;
}

// ================================================================
//  GAME ACTIONS
// ================================================================
// Check if arrow[idx] can escape — head cell walks in arrow.dir to grid edge,
// path must not contain cells of any OTHER alive arrow.
function canEscape(idx){
  const a=arrows[idx];
  if(!a||!a.alive)return false;
  const head=a.cells[a.cells.length-1];
  let cr=head[0]+DY[a.dir],cc=head[1]+DX[a.dir];
  while(cr>=0&&cr<gridRows&&cc>=0&&cc<gridCols){
    for(let j=0;j<arrows.length;j++){
      if(j===idx||!arrows[j].alive)continue;
      for(const[or,oc] of arrows[j].cells){
        if(or===cr&&oc===cc)return false;
      }
    }
    cr+=DY[a.dir];cc+=DX[a.dir];
  }
  return true;
}

// Compute total arc length of an arrow path in pixels (cell-center to cell-center).
// Single-cell arrows get a synthetic body length so the animation has something to render.
function arrowBodyLen(a,cs){
  if(a.cells.length===1)return cs*.38;
  let len=0;
  for(let i=0;i<a.cells.length-1;i++){
    const dr=a.cells[i+1][0]-a.cells[i][0];
    const dc=a.cells[i+1][1]-a.cells[i][1];
    len+=sqrt(dr*dr+dc*dc)*cs;
  }
  return len;
}

// Build world-space extended path for an arrow: polyline through cell centers +
// a long straight extension in the exit direction past the head.
// Single-cell arrows get a synthetic tail point behind the head in backDir.
function buildArrowWorldPath(a,cs,gx,gy){
  const pts=[];
  for(const[r,c] of a.cells)pts.push([gx+c*cs+cs/2,gy+r*cs+cs/2]);
  if(pts.length===1){
    const bd=(a.dir+2)%4;
    const h=pts[0];
    pts.unshift([h[0]+DX[bd]*cs*.38,h[1]+DY[bd]*cs*.38]);
  }
  const head=pts[pts.length-1];
  pts.push([head[0]+DX[a.dir]*1600,head[1]+DY[a.dir]*1600]);
  return pts;
}

function tapArrowByIndex(idx){
  const a=arrows[idx];
  if(!a||!a.alive)return;

  if(canEscape(idx)){
    a.alive=false;
    moves++;

    const cs=getCellSize(),gx=getGridX(),gy=getGridY();
    const bodyLen=arrowBodyLen(a,cs);
    const extLen=1600;
    anims.push({
      arrow:a,
      dir:a.dir,
      t:0,dur:1.2,
      col:TH.arrow,cs,gx,gy,
      bodyLen,totalDist:bodyLen+extLen,
    });
    sfx.swoosh(a.dir);haptic(10);

    // Win check
    let allGone=true;
    for(const ar of arrows)if(ar.alive){allGone=false;break}
    if(allGone){
      setTimeout(()=>{
        S='complete';
        sfx.complete();haptic(30);
        const s=max(1,undosLeft);
        const perfect=(s===3);
        let gained=0;
        if(isWeekly){
          if(!isWeeklyDone()){
            gained=WEEKLY_REWARD;
            localStorage.setItem(weeklyDoneKey(),'1');
          }
        }else if(isDaily){
          if(!isDailyDone()){
            gained=50;
            localStorage.setItem(dailyDoneKey(),'1');
            totalDailies++;
          }
        }else{
          const wasNewStars=(stars[level]||0)<s;
          stars[level]=max(stars[level]||0,s);
          totalStars=Object.values(stars).reduce((a,b)=>a+b,0);
          gained=5+s*5;
          const key='ae_best_'+level;
          const prev=+localStorage.getItem(key)||99999;
          if(timer<prev)localStorage.setItem(key,floor(timer));
          bestTime=min(prev,floor(timer));
          if(undosLeft===3)streak++;else streak=0;
          if(wasNewStars&&perfect)totalPerfect++;
          if(wasNewStars&&!hintUsedThisLevel)noHintCount++;
          fastestLevel=min(fastestLevel,floor(timer));
        }
        coins+=gained;
        totalCoinsEarned+=gained;
        if(gained>0)spawnFloater(W/2,H*.58,'+'+gained);
        checkAchievements({
          level,stars:s,totalStars,streakDays,coins,perfect,isDaily,
          totalPerfect,totalDailies,noHintCount,fastestLevel
        });
        save();
        spawnConfetti();
      },400);
    }
  }else{
    // Blocked — shake the head cell, lose a heart (life)
    const cs=getCellSize(),gx=getGridX(),gy=getGridY();
    const head=a.cells[a.cells.length-1];
    const sx=gx+head[1]*cs+cs/2;
    const sy=gy+head[0]*cs+cs/2;
    shakeAnims.push({x:sx,y:sy,idx,t:0,dur:.2});
    sfx.blocked();haptic([5,30,5]);
    undosLeft--;
    // Visual feedback: floating "-1 ❤" near the head
    spawnFloater(sx,sy-cs*.6,'-1',TH.arrowBlock);
    if(undosLeft<=0){
      setTimeout(()=>{S='gameover';sfx.gameover()},500);
    }
  }
}

// ================================================================
//  GRID HELPERS
// ================================================================
// Grid fills almost the entire screen width. Minimal 8px padding per side.
function getCellSize(){return min((W-16)/gridCols,(H*.70)/gridRows)}
function getGridX(){return(W-gridCols*getCellSize())/2}
function getGridY(){return H*.13}

// ================================================================
//  DRAWING HELPERS
// ================================================================
function txt(t,x,y,sz,col,align,font){
  X.font=`${font||'600'} ${sz}px ${font==='Poppins'?'Poppins':'Nunito'},sans-serif`;
  X.fillStyle=col||TH.text;X.textAlign=align||'center';X.textBaseline='middle';
  X.fillText(t,x,y);
}
function txtP(t,x,y,sz,col,align){txt(t,x,y,sz,col,align,'700')}

function drawArrow(x,y,dir,sz,col,alpha){
  // Simple straight arrow (used for menu animation and flying arrows)
  const angles=[0,-PI/2,PI,PI/2];
  const a=angles[dir];
  const len=sz*.30;
  const headW=sz*.11;
  const headL=sz*.13;
  X.save();X.translate(x,y);X.rotate(a);
  X.globalAlpha=alpha||1;
  const c=col||TH.arrow;
  X.strokeStyle=c;X.lineWidth=max(1.8,sz*.035);X.lineCap='round';
  X.beginPath();X.moveTo(-len,0);X.lineTo(len-headL,0);X.stroke();
  X.fillStyle=c;X.beginPath();
  X.moveTo(len,0);X.lineTo(len-headL,-headW);X.lineTo(len-headL,headW);
  X.closePath();X.fill();
  X.globalAlpha=1;
  X.restore();
}

// Extract a polyline segment from a path between arc positions sFrom and sTo.
// Used by the slide animation to render partial arrows as they travel.
function getPathSegment(path,sFrom,sTo){
  const pts=[];
  let acc=0,started=false;
  for(let i=0;i<path.length-1;i++){
    const x1=path[i][0],y1=path[i][1],x2=path[i+1][0],y2=path[i+1][1];
    const dx=x2-x1,dy=y2-y1;
    const segLen=sqrt(dx*dx+dy*dy);
    if(segLen===0)continue;
    const segEnd=acc+segLen;
    if(!started&&segEnd>sFrom){
      const t=max(0,(sFrom-acc)/segLen);
      pts.push([x1+dx*t,y1+dy*t]);
      started=true;
    }
    if(started){
      if(segEnd>=sTo){
        const t=(sTo-acc)/segLen;
        pts.push([x1+dx*t,y1+dy*t]);
        return pts;
      }
      pts.push([x2,y2]);
    }
    acc=segEnd;
  }
  return pts;
}

// Draw an arrow as a continuous polyline through a list of world-space points,
// with a triangular head at the end pointing in the direction of the last segment.
// Used for both static rendering and animation (via getPathSegment clipping).
function drawArrowPolyline(pts,sz,col,alpha){
  if(pts.length<2)return;
  // Thin lines scaled to cell size. Min 2px keeps lines visible at tiny cells.
  const thick=max(1.5,sz*.10);
  const headL=sz*.32,headW=sz*.22;

  X.save();
  X.globalAlpha=alpha==null?1:alpha;

  // Determine head direction from last body segment
  const last=pts[pts.length-1],prev=pts[pts.length-2];
  const hdx=last[0]-prev[0],hdy=last[1]-prev[1];
  const hlen=sqrt(hdx*hdx+hdy*hdy)||1;
  const nx=hdx/hlen,ny=hdy/hlen;

  // Pull line endpoint back by headL so triangle covers the line end cleanly
  const modPts=pts.slice();
  const k=min(1,headL/hlen);
  modPts[modPts.length-1]=[last[0]-nx*hlen*k,last[1]-ny*hlen*k];

  // Line body: thick, rounded caps and joins for smooth maze-like paths
  X.strokeStyle=col;
  X.lineWidth=thick;
  X.lineCap='round';
  X.lineJoin='round';
  X.beginPath();
  X.moveTo(modPts[0][0],modPts[0][1]);
  for(let i=1;i<modPts.length;i++)X.lineTo(modPts[i][0],modPts[i][1]);
  X.stroke();

  // Triangular arrowhead at the head (tip at `last`, base extending backward)
  const pxv=-ny,pyv=nx;
  const tipX=last[0],tipY=last[1];
  const baseX=tipX-nx*headL,baseY=tipY-ny*headL;
  X.fillStyle=col;
  X.beginPath();
  X.moveTo(tipX,tipY);
  X.lineTo(baseX+pxv*headW,baseY+pyv*headW);
  X.lineTo(baseX-pxv*headW,baseY-pyv*headW);
  X.closePath();
  X.fill();

  X.globalAlpha=1;
  X.restore();
}

// Draw a static arrow (used in the grid) — full path from tail to head.
// Single-cell arrows synthesize a short tail behind the head so the arrowhead
// has something to sit on.
function drawArrowStatic(arrow,cs,gx,gy,col,alpha,shakeOff){
  const pts=[];
  for(const[r,c] of arrow.cells){
    let x=gx+c*cs+cs/2,y=gy+r*cs+cs/2;
    if(shakeOff){x+=shakeOff}
    pts.push([x,y]);
  }
  if(pts.length===1){
    const bd=(arrow.dir+2)%4;
    const h=pts[0];
    pts.unshift([h[0]+DX[bd]*cs*.38,h[1]+DY[bd]*cs*.38]);
  }
  drawArrowPolyline(pts,cs,col,alpha);
}

// Check if this button is currently being pressed (scale feedback)
function btnPressScale(x,y,w,h){
  if(!lastClick)return 1;
  const dt=gt-lastClick.t;
  if(dt>.18)return 1;
  if(abs(lastClick.x-x)>w/2||abs(lastClick.y-y)>h/2)return 1;
  // Ease-out over 0.18s: scale dips to 0.95 then back to 1.0
  const p=dt/.18;
  const dip=sin(p*PI);
  return 1-dip*.05;
}

// Background with soft gradient + colored light blobs — gives the liquid-glass
// buttons something to actually refract, which is the whole point of the material.
function drawBg(){
  // Base gradient
  const bg=X.createLinearGradient(0,0,0,H);
  if(darkMode){
    bg.addColorStop(0,'#24244a');
    bg.addColorStop(1,'#15152a');
  }else{
    bg.addColorStop(0,'#faf7f1');
    bg.addColorStop(1,'#ece6d8');
  }
  X.fillStyle=bg;X.fillRect(0,0,W,H);

  // Colored light blobs (simulate the wallpaper Liquid Glass refracts)
  X.save();
  X.globalAlpha=darkMode?.35:.22;
  // Top-right warm blob
  const b1=X.createRadialGradient(W*.85,H*.12,0,W*.85,H*.12,W*.7);
  b1.addColorStop(0, darkMode?'#d48a4a':'#d4aa4a');
  b1.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=b1;X.fillRect(0,0,W,H);
  // Bottom-left cool blob
  const b2=X.createRadialGradient(W*.1,H*.85,0,W*.1,H*.85,W*.8);
  b2.addColorStop(0, darkMode?'#5a7aaa':'#7a9cc8');
  b2.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=b2;X.fillRect(0,0,W,H);
  // Mid pink blob
  const b3=X.createRadialGradient(W*.7,H*.55,0,W*.7,H*.55,W*.55);
  b3.addColorStop(0, darkMode?'#a66090':'#e88aa8');
  b3.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=b3;X.fillRect(0,0,W,H);
  X.restore();
}

// Glass overlay. Full iOS 26 Liquid Glass on iOS; subtle Material-style tint on Android.
// Call AFTER the base fill and BEFORE outer stroke.
function glass(x,y,w,h,r){
  if(IS_ANDROID){
    // Android: soft, minimal — just a gentle top highlight, no harsh specular.
    // Avoids the overbright "plastic" look in dark mode.
    X.save();
    X.beginPath();X.roundRect(x,y,w,h,r);X.clip();
    const g=X.createLinearGradient(0,y,0,y+h);
    g.addColorStop(0, darkMode?'rgba(255,255,255,.07)':'rgba(255,255,255,.18)');
    g.addColorStop(1, darkMode?'rgba(255,255,255,0)':'rgba(255,255,255,0)');
    X.fillStyle=g;X.fillRect(x,y,w,h);
    X.restore();
    return;
  }

  // iOS + web: full Liquid Glass
  const rr=max(0,r-.5);

  X.save();
  X.beginPath();X.roundRect(x,y,w,h,r);X.clip();

  // 1) GLASS MATERIAL — translucent tint on top of existing backdrop
  X.fillStyle=darkMode?'rgba(255,255,255,.1)':'rgba(255,255,255,.22)';
  X.fillRect(x,y,w,h);

  // 2) STRONG TOP SPECULAR — solid-white pulse along the top arc
  const g1=X.createLinearGradient(0,y,0,y+h*.5);
  g1.addColorStop(0,   darkMode?'rgba(255,255,255,.7)': 'rgba(255,255,255,1)');
  g1.addColorStop(.35, darkMode?'rgba(255,255,255,.15)':'rgba(255,255,255,.25)');
  g1.addColorStop(1,   'rgba(255,255,255,0)');
  X.fillStyle=g1;X.fillRect(x,y,w,h*.5);

  // 3) LENS INSET SHADOW — creates concave-glass volume
  const g2=X.createLinearGradient(0,y+h*.4,0,y+h);
  g2.addColorStop(0, 'rgba(0,0,0,0)');
  g2.addColorStop(1, darkMode?'rgba(0,0,0,.25)':'rgba(0,0,0,.11)');
  X.fillStyle=g2;X.fillRect(x,y+h*.4,w,h*.6);

  // 4) BOTTOM LIGHT BLEED — bright refracted lens lip
  const g3=X.createLinearGradient(0,y+h*.78,0,y+h);
  g3.addColorStop(0, 'rgba(255,255,255,0)');
  g3.addColorStop(1, darkMode?'rgba(255,255,255,.35)':'rgba(255,255,255,.65)');
  X.fillStyle=g3;X.fillRect(x,y+h*.78,w,h*.22);

  X.restore();

  // 5) BRIGHT TOP RIM — 1.5px hairline specular following the upper curve
  X.save();
  X.beginPath();X.rect(x,y,w,h*.5);X.clip();
  X.beginPath();X.roundRect(x+.75,y+.75,w-1.5,h-1.5,max(0,r-.75));
  X.strokeStyle=darkMode?'rgba(255,255,255,.75)':'rgba(255,255,255,1)';
  X.lineWidth=1.5;X.stroke();
  X.restore();

  // 6) BOTTOM RIM — refracted "lens lip" light
  X.save();
  X.beginPath();X.rect(x,y+h*.6,w,h*.4);X.clip();
  X.beginPath();X.roundRect(x+.5,y+.5,w-1,h-1,rr);
  X.strokeStyle=darkMode?'rgba(255,255,255,.4)':'rgba(255,255,255,.8)';
  X.lineWidth=1;X.stroke();
  X.restore();
}

function drawBtn(label,x,y,w,h,color){
  const hv=abs(mx-x)<w/2&&abs(my-y)<h/2;
  const sc=btnPressScale(x,y,w,h);
  const dw=w*sc,dh=h*sc;
  const r=dh/2;
  X.fillStyle=hv?TH.btnHover:TH.btnBg;
  X.beginPath();X.roundRect(x-dw/2,y-dh/2,dw,dh,r);X.fill();
  glass(x-dw/2,y-dh/2,dw,dh,r);
  X.strokeStyle=hv?(color||TH.accent)+'60':TH.border;X.lineWidth=hv?1.5:1;
  X.beginPath();X.roundRect(x-dw/2,y-dh/2,dw,dh,r);X.stroke();
  txt(label,x,y,floor(h*.38),hv?TH.text:TH.textSec);
  if(tapped&&abs(tapX-x)<w/2&&abs(tapY-y)<h/2){sfx.tap();tapped=false;return true}
  return false;
}

function drawBigBtn(label,x,y,w,h,color){
  const hv=abs(mx-x)<w/2&&abs(my-y)<h/2;
  const sc=btnPressScale(x,y,w,h);
  const dw=w*sc,dh=h*sc;
  const r=dh/2;
  const c=color||TH.accent;
  X.fillStyle=hv?c+'25':c+'15';
  X.beginPath();X.roundRect(x-dw/2,y-dh/2,dw,dh,r);X.fill();
  glass(x-dw/2,y-dh/2,dw,dh,r);
  X.strokeStyle=c+'50';X.lineWidth=1.5;
  X.beginPath();X.roundRect(x-dw/2,y-dh/2,dw,dh,r);X.stroke();
  txt(label,x,y,floor(h*.4),hv?TH.text:(darkMode?'rgba(255,255,255,.7)':'rgba(0,0,0,.5)'));
  if(tapped&&abs(tapX-x)<w/2&&abs(tapY-y)<h/2){sfx.tap();haptic(5);tapped=false;return true}
  return false;
}

function drawStar(x,y,sz,filled){
  X.save();X.translate(x,y);
  X.beginPath();
  for(let i=0;i<5;i++){
    const a1=i*TAU/5-PI/2,a2=a1+TAU/10;
    X.lineTo(cos(a1)*sz,sin(a1)*sz);
    X.lineTo(cos(a2)*sz*.4,sin(a2)*sz*.4);
  }
  X.closePath();
  if(filled){X.fillStyle=TH.star;X.fill()}
  else{X.strokeStyle=TH.star+'40';X.lineWidth=1;X.stroke()}
  X.restore();
}

// Render a proper-looking coin: yellow disk + dark inner ring + highlight shine
function drawCoin(x,y,r){
  // Outer shadow for depth
  X.fillStyle=darkMode?'rgba(0,0,0,.35)':'rgba(80,55,0,.25)';
  X.beginPath();X.arc(x+r*.12,y+r*.15,r,0,TAU);X.fill();
  // Main disk
  X.fillStyle=TH.star;
  X.beginPath();X.arc(x,y,r,0,TAU);X.fill();
  // Inner ring
  X.strokeStyle=darkMode?'rgba(0,0,0,.45)':'rgba(120,85,0,.55)';
  X.lineWidth=max(.8,r*.18);
  X.beginPath();X.arc(x,y,r*.68,0,TAU);X.stroke();
  // Top-left highlight for coin shine
  X.fillStyle='rgba(255,255,255,.55)';
  X.beginPath();X.arc(x-r*.32,y-r*.32,r*.24,0,TAU);X.fill();
}

// --- PLAY ---
function drawPlay(){
  drawBg();

  const cs=getCellSize(),gx=getGridX(),gy=getGridY();

  // Top bar
  txt('Level '+level,W/2,30,16,TH.text);
  // Stars for this level goal
  for(let i=0;i<3;i++){
    drawStar(W/2-20+i*20,55,7,moves<=minMoves+i*1&&i<(moves<=minMoves?3:moves<=minMoves+2?2:1));
  }

  // Hearts = lives. Lose one per wrong tap; at 0 → game over.
  for(let i=0;i<3;i++){
    const hx=W-26-i*24,hy=28;
    const full=i<undosLeft;
    X.fillStyle=full?'#e05555':(darkMode?'rgba(255,255,255,.08)':'rgba(0,0,0,.08)');
    X.save();X.translate(hx,hy);
    X.beginPath();
    X.moveTo(0,3);X.bezierCurveTo(-5,-2,-9,-1,-9,3);X.bezierCurveTo(-9,8,0,12,0,12);
    X.bezierCurveTo(0,12,9,8,9,3);X.bezierCurveTo(9,-1,5,-2,0,3);
    X.fill();X.restore();
  }

  // Pause button (top left)
  const phv=abs(mx-30)<18&&abs(my-35)<18;
  txt('≡',30,35,20,phv?TH.text:TH.textSec);
  if(tapped&&abs(tapX-30)<18&&abs(tapY-35)<18){sfx.tap();tapped=false;goto('menu',()=>{isDaily=false;isWeekly=false});return}

  // Advance level reveal animation (staggered fade-in of all arrows)
  if(levelRevealT<1)levelRevealT=min(1,levelRevealT+1/60/.9);

  // Draw all alive arrows as continuous paths through their cells
  for(let i=0;i<arrows.length;i++){
    const a=arrows[i];
    if(!a.alive)continue;

    // Reveal alpha: each arrow fades in with a small offset based on index
    let revealA=1;
    if(levelRevealT<1){
      const perArrowOffset=0.5/max(1,arrows.length);
      const start=i*perArrowOffset;
      revealA=clp((levelRevealT-start)/0.5,0,1);
      if(revealA<=0)continue;
    }

    // Check if shaking (blocked feedback on head cell)
    let shakeOff=0,isShaking=false;
    for(const sh of shakeAnims){
      if(sh.idx===i){
        const p=sh.t/sh.dur;
        shakeOff=sin(p*PI*6)*4*(1-p);
        isShaking=true;
      }
    }

    // Hint highlight — pulse a warm yellow glow behind the hinted arrow
    if(i===hintArrow&&hintTime>0){
      const pulse=.5+.5*sin(gt*6);
      X.save();
      X.shadowColor=TH.star;
      X.shadowBlur=10+pulse*14;
      drawArrowStatic(a,cs,gx,gy,TH.star,.9*revealA,shakeOff);
      X.restore();
    }

    const col=isShaking?TH.arrowBlock:(i===hintArrow&&hintTime>0?TH.star:TH.arrow);
    drawArrowStatic(a,cs,gx,gy,col,revealA,shakeOff);
  }

  // Tick down hint timer
  if(hintTime>0){hintTime-=1/60;if(hintTime<=0)hintArrow=-1}

  // Tutorial on level 1 — show after reveal animation completes
  if(level===1&&!isDaily&&!isWeekly&&levelRevealT>=1&&moves===0){
    let tutIdx=-1;
    for(let i=0;i<arrows.length;i++){
      if(arrows[i].alive&&canEscape(i)){tutIdx=i;break}
    }
    window._tutDebug={tutIdx,arrowsLen:arrows.length,revealT:levelRevealT,moves};
    const aliveCount=arrows.filter(a=>a.alive).length;
    const totalCount=arrows.length;

    if(tutIdx>=0){
      const pulse=.5+.5*sin(gt*4);
      const ta=arrows[tutIdx];
      const head=ta.cells[ta.cells.length-1];
      const hx=gx+head[1]*cs+cs/2,hy=gy+head[0]*cs+cs/2;

      // No dark overlay — just glow on the correct arrow
      X.save();
      X.shadowColor=TH.star;
      X.shadowBlur=16+pulse*20;
      drawArrowStatic(ta,cs,gx,gy,TH.star,.6,0);
      X.restore();

      // Short dashed line (5-6 dashes) + small arrowhead at end
      const dir=ta.dir;
      const lineLen=min(cs*2.5,60); // 5-6 dashes max, never goes past hearts
      const endX=hx+DX[dir]*lineLen,endY=hy+DY[dir]*lineLen;
      X.strokeStyle=TH.star;
      X.lineWidth=2;
      X.globalAlpha=.3+pulse*.4;
      X.setLineDash([6,4]);
      X.beginPath();
      X.moveTo(hx+DX[dir]*cs*.5,hy+DY[dir]*cs*.5);
      X.lineTo(endX,endY);
      X.stroke();
      X.setLineDash([]);
      // Small arrowhead at end of dashed line
      const aLen=8,aW=5;
      X.fillStyle=TH.star;
      X.beginPath();
      X.moveTo(endX+DX[dir]*aLen,endY+DY[dir]*aLen);
      X.lineTo(endX-DY[dir]*aW,endY+DX[dir]*aW);
      X.lineTo(endX+DY[dir]*aW,endY-DX[dir]*aW);
      X.closePath();X.fill();
      X.globalAlpha=1;

      // Text
      txt('Tap this arrow',W/2,76,14,TH.star,'center','700');
      txt('It has a clear path to the edge',W/2,94,11,darkMode?'#aaa':'#666');
    }else if(moves>0&&moves<4){
      txt('Great! Keep going!',W/2,76,14,TH.success,'center','700');
    }
  }

  // Tap detection — find the alive arrow whose nearest cell center is closest
  // to the tap point (within a generous radius).
  if(tapped){
    let bestIdx=-1,bestDist=cs*.85;
    for(let i=0;i<arrows.length;i++){
      const a=arrows[i];
      if(!a.alive)continue;
      for(const[r,c] of a.cells){
        const ax=gx+c*cs+cs/2,ay=gy+r*cs+cs/2;
        const d=sqrt((tapX-ax)*(tapX-ax)+(tapY-ay)*(tapY-ay));
        if(d<bestDist){bestDist=d;bestIdx=i;}
      }
    }
    if(bestIdx>=0){tapArrowByIndex(bestIdx);tapped=false;}
  }

  // Slide animations: whole arrow path traces itself along its own route,
  // then continues straight off-screen past the head.
  for(let i=anims.length-1;i>=0;i--){
    const an=anims[i];
    an.t+=1/60;
    if(an.t>=an.dur){anims.splice(i,1);continue}

    // Build the extended world-space path (cells + straight extension in exit dir)
    const path=buildArrowWorldPath(an.arrow,an.cs,an.gx,an.gy);

    const p=an.t/an.dur;
    const ep=p<.5?2*p*p:1-2*(1-p)*(1-p); // ease-in-out: smooth start and end
    const tailPos=ep*an.totalDist;
    const headPos=tailPos+an.bodyLen;
    const pts=getPathSegment(path,tailPos,headPos);

    const alpha=p>.85?1-(p-.85)/.15:1;
    drawArrowPolyline(pts,an.cs,an.col,alpha);
  }

  // Shake animations
  for(let i=shakeAnims.length-1;i>=0;i--){
    shakeAnims[i].t+=1/60;
    if(shakeAnims[i].t>=shakeAnims[i].dur)shakeAnims.splice(i,1);
  }

  // Bottom bar: stats row + action buttons row
  const sy1=H*.87;
  txt('Moves: '+moves+'/'+minMoves,W*.22,sy1,11,moves>minMoves?TH.warning:TH.textSec);
  const tm=floor(timer),mm=floor(tm/60),ss=tm%60;
  txt(mm+':'+(ss<10?'0':'')+ss,W*.52,sy1,11,TH.textSec);
  drawCoin(W*.72,sy1,6);
  txt(coins+'',W*.75,sy1,11,TH.star,'left');

  // Action buttons row (Hint + Skip)
  const by=H*.93,bw=80,bh=30;
  // HINT
  const hbx=W*.32;
  const hbhv=abs(mx-hbx)<bw/2&&abs(my-by)<bh/2;
  const canHint=coins>=HINT_COST&&hintTime<=0;
  X.fillStyle=canHint?(hbhv?TH.star+'35':TH.star+'20'):TH.btnBg;
  X.beginPath();X.roundRect(hbx-bw/2,by-bh/2,bw,bh,bh/2);X.fill();
  glass(hbx-bw/2,by-bh/2,bw,bh,bh/2);
  X.strokeStyle=canHint?TH.star+'60':TH.border;X.lineWidth=1;
  X.beginPath();X.roundRect(hbx-bw/2,by-bh/2,bw,bh,bh/2);X.stroke();
  txt(t('hint'),hbx-bw*.26,by,11,canHint?TH.text:TH.textDim);
  drawCoin(hbx+bw*.05,by,5);
  txt(HINT_COST+'',hbx+bw*.15,by,10,canHint?TH.star:TH.textDim,'left');
  if(tapped&&abs(tapX-hbx)<bw/2&&abs(tapY-by)<bh/2){
    if(canHint)useHint();
    tapped=false;
  }
  // SKIP
  const sbx=W*.68;
  const sbhv=abs(mx-sbx)<bw/2&&abs(my-by)<bh/2;
  const canSkip=coins>=SKIP_COST&&!isDaily;
  X.fillStyle=canSkip?(sbhv?TH.warning+'35':TH.warning+'20'):TH.btnBg;
  X.beginPath();X.roundRect(sbx-bw/2,by-bh/2,bw,bh,bh/2);X.fill();
  glass(sbx-bw/2,by-bh/2,bw,bh,bh/2);
  X.strokeStyle=canSkip?TH.warning+'60':TH.border;X.lineWidth=1;
  X.beginPath();X.roundRect(sbx-bw/2,by-bh/2,bw,bh,bh/2);X.stroke();
  txt(t('skip'),sbx-bw*.26,by,11,canSkip?TH.text:TH.textDim);
  drawCoin(sbx+bw*.05,by,5);
  txt(SKIP_COST+'',sbx+bw*.13,by,10,canSkip?TH.star:TH.textDim,'left');
  if(tapped&&abs(tapX-sbx)<bw/2&&abs(tapY-by)<bh/2){
    if(canSkip)skipLevel();
    tapped=false;
  }

  // Update timers
  timer+=1/60;
  totalPlayTime+=1/60;

  if(tapped)tapped=false;
}

// --- COMPLETE ---
function drawComplete(){
  drawBg();

  // Confetti
  for(let i=confetti.length-1;i>=0;i--){
    const p=confetti[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.rot+=p.rv*.02;p.life-=1/60;
    if(p.life<=0){confetti.splice(i,1);continue}
    X.globalAlpha=clp(p.life,0,1);
    X.fillStyle=p.col;
    X.save();X.translate(p.x,p.y);X.rotate(p.rot);
    if(p.shape===0)X.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz*.6);
    else{X.beginPath();X.arc(0,0,p.sz/2,0,TAU);X.fill()}
    X.restore();
    X.globalAlpha=1;
  }

  // Check mark
  X.strokeStyle=TH.success;X.lineWidth=3;X.lineCap='round';
  X.beginPath();X.arc(W/2,H*.18,28,0,TAU);X.stroke();
  X.beginPath();X.moveTo(W/2-12,H*.18);X.lineTo(W/2-3,H*.18+10);X.lineTo(W/2+14,H*.18-8);X.stroke();

  const title=isWeekly?'WEEKLY DONE':(isDaily?'DAILY COMPLETE':'LEVEL '+level);
  txtP(title,W/2,H*.27,24,TH.text);

  // Stars (skipped for daily/weekly)
  const s=(isDaily||isWeekly)?3:(stars[level]||1);
  if(!isDaily&&!isWeekly)for(let i=0;i<3;i++)drawStar(W/2-30+i*30,H*.34,12,i<s);

  // Stats — 3 columns
  txt('Arrows',W*.22,H*.42,11,TH.textSec);
  txtP(minMoves+'',W*.22,H*.47,18,TH.text);
  txt('Hearts',W*.5,H*.42,11,TH.textSec);
  txtP(undosLeft+'/3',W*.5,H*.47,18,undosLeft===3?TH.success:TH.text);
  txt('Time',W*.78,H*.42,11,TH.textSec);
  const tm=floor(timer),mm=floor(tm/60),ss=tm%60;
  txtP(mm+':'+(ss<10?'0':'')+ss,W*.78,H*.47,18,TH.text);

  if(!isDaily&&!isWeekly&&bestTime>0){
    txt('Best: '+floor(bestTime)+'s',W/2,H*.53,11,TH.textDim);
  }

  // Coins earned
  const coinReward=isWeekly?WEEKLY_REWARD:(isDaily?50:5+s*5);
  drawCoin(W/2-22,H*.60,9);
  txtP('+'+coinReward,W/2+8,H*.60,16,TH.star);

  // Buttons — daily/weekly return to menu; normal level goes to next
  if(isDaily||isWeekly){
    if(drawBigBtn('BACK TO MENU',W/2,H*.67,220,50,TH.accent)){
      goto('menu',()=>{isDaily=false;isWeekly=false});
    }
  }else{
    if(drawBigBtn(t('nextLevel'),W/2,H*.67,200,50,TH.accent)){
      showInterstitialAd(); // timed interstitial every 5 min
      goto('play',()=>{level++;save();generateLevel(level)});
    }
    if(drawBtn(t('replay'),W/2,H*.74,140,36)){
      goto('play',()=>{generateLevel(level)});
    }
    if(drawBtn(t('home'),W/2,H*.80,140,36)){goto('menu')}
  }

  if(tapped)tapped=false;
}

// --- ACHIEVEMENTS LIST ---

  drawBg();

    const a=ACHIEVEMENTS[i];
    const y=startY+i*(cardH+cardGap);

    const done=!!achUnlocked[a.id];
    // Card
    X.fillStyle=done?TH.star+'18':TH.cardBg;
    X.beginPath();X.roundRect(20,y,cardW,cardH,10);X.fill();

    if(done){
      drawStar(42,y+cardH/2,12,true);
    }else{
      X.fillStyle=TH.textDim;
      X.beginPath();X.arc(42,y+cardH/2,10,0,TAU);X.fill();

    // Reward (right-aligned, measured so it stays inside card)

// Achievement unlock popup — animates at top of screen
function drawAchPopup(){
  if(!achPopup)return;
  achPopup.t+=1/60;
  const dur=3.5;
  if(achPopup.t>=dur){achPopup=null;return}
  const a=ACHIEVEMENTS.find(x=>x.id===achPopup.id);
  if(!a){achPopup=null;return}
  const p=achPopup.t/dur;
  // Slide in (0-0.2), hold (0.2-0.85), slide out (0.85-1)
  let offY;
  if(p<.15)offY=-80+(p/.15)*80;
  else if(p>.85)offY=-((p-.85)/.15)*80;
  else offY=0;

  const pw=320,ph=58,px=(W-pw)/2,py=20+offY;
  X.save();
  X.shadowColor='rgba(0,0,0,.3)';X.shadowBlur=15;X.shadowOffsetY=3;
  X.fillStyle=TH.surface;
  X.beginPath();X.roundRect(px,py,pw,ph,14);X.fill();
  X.restore();
  glass(px,py,pw,ph,14);
  X.strokeStyle=TH.star+'80';X.lineWidth=2;
  X.beginPath();X.roundRect(px,py,pw,ph,14);X.stroke();
  // Star icon
  drawStar(px+28,py+ph/2,14,true);
  // Text
  txt('ACHIEVEMENT UNLOCKED',px+50,py+17,8,TH.star,'left','700');
  txtP(a.name,px+50,py+36,12,TH.text,'left');
  // Reward — inside the box
  drawCoin(px+pw-40,py+ph/2,7);
  txt('+'+a.reward,px+pw-28,py+ph/2,10,TH.star,'left');
}

// --- SETTINGS ---
let resetConfirm=false;
let langPickerOpen=false;
function drawSettings(){
  drawBg();
  txtP(t('settings'),W/2,50,22,TH.text);

  // Snapshot whether picker was already open ENTERING this frame.
  // If it was, suppress taps on underlying buttons and allow the overlay to consume tap.
  // If it wasn't (i.e. it gets opened this frame by the Language button), the
  // tap is already consumed by drawBtn and must NOT be replayed into the overlay.
  const pickerWasOpen=langPickerOpen;
  const savedTapped=tapped;
  if(pickerWasOpen)tapped=false;

  // Language — opens picker popup on tap
  const curLang=LANGS.find(l=>l.code===lang)||LANGS[0];
  if(drawBtn(t('language')+': '+curLang.name,W/2,110,260,44)){
    langPickerOpen=true;
  }

  // Sound
  if(drawBtn(t('sound')+': '+(sndOn?t('on'):t('off')),W/2,165,260,44)){
    sndOn=!sndOn;localStorage.setItem('ae_sound',sndOn?'1':'0');
  }
  // Dark mode
  if(drawBtn(t('theme')+': '+(darkMode?t('themeDark'):t('themeLight')),W/2,220,260,44)){
    darkMode=!darkMode;localStorage.setItem('ae_theme',darkMode?'dark':'light');applyTheme();
  }
  // Remove Ads — $9.99
  if(!adsRemoved){
    if(drawBtn(t('removeAds')+' — $9.99',W/2,295,260,44,TH.accent)){
      buyRemoveAds();
    }
  }else{
    txt(t('adsRemoved'),W/2,295,13,TH.success);
  }

  // Watch Ad for Coins
  if(drawBtn(t('watchAd')+' → +'+AD_COIN_REWARD+' '+t('coins'),W/2,350,260,44,TH.star)){
    showRewardedAd(()=>{coins+=AD_COIN_REWARD;totalCoinsEarned+=AD_COIN_REWARD;save();spawnFloater(W/2,350,'+'+AD_COIN_REWARD)});
  }

  // Reset — two-tap confirmation (no native dialogs)
  if(!resetConfirm){
    if(drawBtn(t('resetProgress'),W/2,425,200,44,TH.warning)){resetConfirm=true}
  }else{
    txt(t('areYouSure'),W/2,415,13,TH.warning);
    if(drawBtn(t('yesReset'),W/2-60,455,110,40,TH.arrowBlock)){
      localStorage.clear();level=1;maxLevel=1;coins=60;stars={};totalStars=0;
      achUnlocked={};totalPerfect=0;totalDailies=0;noHintCount=0;
      totalCoinsEarned=0;streakDays=0;totalPlayTime=0;fastestLevel=99999;
      lastPlayDay=0;hintUsedThisLevel=false;
      adsRemoved=false;resetConfirm=false;save();
      goto('menu');
    }
    if(drawBtn(t('cancel'),W/2+60,455,110,40)){resetConfirm=false}
  }

  if(drawBtn('← '+t('back'),W/2,H-60,140,38)){resetConfirm=false;goto('menu')}

  // Only restore tap if picker was ALREADY open entering this frame.
  // If it was just opened now, the opening tap has already been consumed
  // by the Language button and must not leak into the overlay.
  if(pickerWasOpen)tapped=savedTapped;

  // Language picker popup — rendered LAST so it overlays everything
  if(langPickerOpen){
    // Dim backdrop
    X.fillStyle='rgba(0,0,0,.55)';X.fillRect(0,0,W,H);
    // Tap outside to close
    if(tapped){
      const pw=Math.min(320,W-32),rowH=44,ph=Math.min(LANGS.length*rowH+70,H-80);
      const px=(W-pw)/2,py=(H-ph)/2;
      if(tapX<px||tapX>px+pw||tapY<py||tapY>py+ph){
        langPickerOpen=false;tapped=false;
      }
    }
    // Panel
    const pw=Math.min(320,W-32);
    const rowH=44;
    const ph=Math.min(LANGS.length*rowH+70,H-80);
    const px=(W-pw)/2,py=(H-ph)/2;
    X.save();
    X.shadowColor='rgba(0,0,0,.4)';X.shadowBlur=20;X.shadowOffsetY=6;
    X.fillStyle=TH.surface;
    X.beginPath();X.roundRect(px,py,pw,ph,16);X.fill();
    X.restore();
    glass(px,py,pw,ph,16);
    X.strokeStyle=TH.border;X.lineWidth=1;
    X.beginPath();X.roundRect(px,py,pw,ph,16);X.stroke();
    // Title
    txtP(t('language'),W/2,py+24,14,TH.text);
    // Language rows
    const listTop=py+48;
    for(let i=0;i<LANGS.length;i++){
      const L=LANGS[i];
      const ry=listTop+i*rowH;
      if(ry+rowH>py+ph-6)break;
      const isCur=L.code===lang;
      const hv=mx>px+12&&mx<px+pw-12&&my>ry&&my<ry+rowH;
      // Row bg
      if(isCur){
        X.fillStyle=TH.accent+'22';
        X.beginPath();X.roundRect(px+10,ry+3,pw-20,rowH-6,8);X.fill();
      }else if(hv){
        X.fillStyle=TH.border;
        X.beginPath();X.roundRect(px+10,ry+3,pw-20,rowH-6,8);X.fill();
      }
      // Name
      txt(L.name,px+24,ry+rowH/2,13,isCur?TH.accent:TH.text,'left',isCur?'700':'600');
      // Checkmark
      if(isCur){
        X.strokeStyle=TH.accent;X.lineWidth=2;X.lineCap='round';
        X.beginPath();
        X.moveTo(px+pw-30,ry+rowH/2);
        X.lineTo(px+pw-22,ry+rowH/2+5);
        X.lineTo(px+pw-14,ry+rowH/2-6);
        X.stroke();
      }
      // Tap detect
      if(tapped&&tapX>px+10&&tapX<px+pw-10&&tapY>ry&&tapY<ry+rowH){
        lang=L.code;
        localStorage.setItem('ae_lang',lang);
        sfx.tap();
        langPickerOpen=false;
        tapped=false;
      }
    }
    if(tapped)tapped=false;
  }

  if(tapped)tapped=false;
}

// --- LEVELS ---
// Paginated: 25 levels per page (5×5 grid). Unlimited pages. Each card shows
// the level number, stars earned, and lock state.
const LEVELS_PER_PAGE=25;
function drawLevels(){
  drawBg();

  // Header
  txtP(t('levels'),W/2,48,22,TH.text);

  const fromLv=levelsPage*LEVELS_PER_PAGE+1;
  const toLv=fromLv+LEVELS_PER_PAGE-1;
  txt(fromLv+' – '+toLv,W/2,72,12,TH.textSec);

  // Coins display top-right
  drawCoin(W-50,36,7);
  txt(coins+'',W-40,36,13,TH.star,'left');

  // Grid of 25 level cards (5×5)
  const cols=5,rows=5;
  const cellW=62,cellH=66;
  const gridW=cols*cellW,gridH=rows*cellH;
  const startX=(W-gridW)/2;
  const startY=100;

  for(let i=0;i<cols*rows;i++){
    const lv=fromLv+i;
    const r=floor(i/cols),c=i%cols;
    const x=startX+c*cellW+cellW/2;
    const y=startY+r*cellH+cellH/2;

    const unlocked=lv<=maxLevel;
    const current=lv===level;
    const done=stars[lv]>0;
    const s=stars[lv]||0;
    const hv=abs(mx-x)<26&&abs(my-y)<30;

    // Card background
    const cardW=52,cardH=56;
    if(current){
      X.fillStyle=TH.accent+'30';
    }else if(done){
      X.fillStyle=TH.star+'18';
    }else if(unlocked){
      X.fillStyle=hv?TH.btnHover:TH.btnBg;
    }else{
      X.fillStyle=TH.cardBg;
    }
    X.beginPath();X.roundRect(x-cardW/2,y-cardH/2,cardW,cardH,10);X.fill();
    glass(x-cardW/2,y-cardH/2,cardW,cardH,10);
    // Border
    X.strokeStyle=current?TH.accent:(done?TH.star+'60':TH.border);
    X.lineWidth=current?2:1;
    X.beginPath();X.roundRect(x-cardW/2,y-cardH/2,cardW,cardH,10);X.stroke();

    // Level number
    txtP(lv+'',x,y-8,unlocked?15:13,unlocked?TH.text:TH.textDim);

    // Stars (real star shapes)
    for(let j=0;j<3;j++){
      const sx=x-10+j*10,sy=y+14;
      drawStar(sx,sy,4,done&&j<s);
    }

    // Lock indicator — small dim bar under the level number for locked levels
    if(!unlocked){
      X.strokeStyle=TH.textDim;X.lineWidth=1.2;X.lineCap='round';
      X.beginPath();X.moveTo(x-7,y+4);X.lineTo(x+7,y+4);X.stroke();
    }

    // Tap
    if(tapped&&abs(tapX-x)<cardW/2&&abs(tapY-y)<cardH/2&&unlocked){
      sfx.tap();tapped=false;
      goto('play',()=>{level=lv;isDaily=false;isWeekly=false;generateLevel(level)});
      return;
    }
  }

  // Pagination controls
  const pagY=H-110;
  const hasPrev=levelsPage>0;
  const hasNext=true; // unlimited levels
  if(hasPrev){
    if(drawBtn('← Prev',W*.28,pagY,100,36)){levelsPage--}
  }
  txt('Page '+(levelsPage+1),W/2,pagY,12,TH.textSec);
  if(hasNext){
    if(drawBtn('Next →',W*.72,pagY,100,36)){levelsPage++}
  }

  // Back to menu
  if(drawBtn('← '+t('back'),W/2,H-55,140,36)){goto('menu')}
  if(tapped)tapped=false;
}

// ================================================================
//  MAIN LOOP
// ================================================================
let _lastT=0;
let fadingOut=false;
function goto(newState,action){
  if(fadingOut)return;
  fadingOut=true;
  pendingState={state:newState,action:action||null};
}
function loop(t){
  const dt=min((t-_lastT)/1000,.05);_lastT=t;gt+=dt;

  // Fade transition: fade-out then apply pending state then fade-in
  if(fadingOut){
    fadeAlpha=min(1,fadeAlpha+dt*5);
    if(fadeAlpha>=1){
      if(pendingState){
        if(pendingState.action)pendingState.action();
        S=pendingState.state;
        pendingState=null;
      }
      fadingOut=false;
    }
  }else if(fadeAlpha>0){
    fadeAlpha=max(0,fadeAlpha-dt*4);
  }

  // Render
  if(S==='menu')drawMenu();
  else if(S==='play')drawPlay();
  else if(S==='complete')drawComplete();
  else if(S==='gameover')drawGameOver();
  else if(S==='settings')drawSettings();
  else if(S==='levels')drawLevels();
  else if(S==='achievements')drawAchievements();
  else if(S==='stats')drawStats();

  // Global: floating coin popups + achievement unlock popup
  drawFloaters();
  drawAchPopup();

  // Screen fade overlay
  if(fadeAlpha>0){
    X.fillStyle=darkMode?`rgba(26,26,46,${fadeAlpha})`:`rgba(245,242,237,${fadeAlpha})`;
    X.fillRect(0,0,W,H);
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Register service worker for offline play + PWA install
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
// Debug access
window._ae={get arrows(){return arrows},get gridCols(){return gridCols},get gridRows(){return gridRows},get level(){return level},get levelRevealT(){return levelRevealT},get moves(){return moves},get isDaily(){return isDaily},get isWeekly(){return isWeekly}};
})(); // end IIFE
</script>
