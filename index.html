// Surface any uncaught error visibly — without this a JS error gives a blank
// white screen with no clue. Persists in localStorage for post-mortem.
window.addEventListener('error', function(e){
  try{
    localStorage.setItem('ae_lasterror', (e.message||'?')+' @ '+(e.filename||'?')+':'+(e.lineno||'?')+':'+(e.colno||'?'));
    var div=document.createElement('div');
    div.style.cssText='position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;font:12px monospace;padding:10px;z-index:99999;white-space:pre-wrap';
    div.textContent='JS ERROR: '+(e.message||'?')+'\n@ '+(e.filename||'?')+':'+(e.lineno||'?');
    document.body.appendChild(div);
  }catch(_){}
});
window.addEventListener('unhandledrejection', function(e){
  try{ localStorage.setItem('ae_lastreject', String(e.reason||'?')); }catch(_){}
});

// Polyfill CanvasRenderingContext2D.roundRect for iOS 15.x and 16.0–16.3
// (only available natively in 16.4+). Without this the app instantly throws
// "X.roundRect is not a function" → white screen on older devices. Apple
// still allows iOS 15 in the App Store, so we ship the polyfill.
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r=[r,r,r,r];
    else if(r.length===1)r=[r[0],r[0],r[0],r[0]];
    else if(r.length===2)r=[r[0],r[1],r[0],r[1]];
    const [tl,tr,br,bl]=r;
    this.moveTo(x+tl,y);
    this.arcTo(x+w,y,   x+w,y+h, tr);
    this.arcTo(x+w,y+h, x,  y+h, br);
    this.arcTo(x,  y+h, x,  y,   bl);
    this.arcTo(x,  y,   x+w,y,   tl);
    this.closePath();
    return this;
  };
}

  try{

// ================================================================
//  DPR + RESIZE — canvas fills the FULL viewport (including under notch).
//  We render at logical W×H but stretch the bg to cover any letterbox so
//  the screen never shows phone chrome behind the canvas.
//  safeTop/safeBottom are exposed in logical pixels for UI offset.
// ================================================================
let dpr=1;
let safeTop=0,safeBottom=0,safeLeft=0,safeRight=0;
let scaleY=1; // CSS px per logical px on the Y axis (used to convert env() values)
function _readSafeArea(){
  try{
    let probe=document.getElementById('_sap');
    if(!probe){
      probe=document.createElement('div');
      probe.id='_sap';
      probe.style.cssText='position:fixed;top:0;left:0;width:0;height:0;visibility:hidden;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)';
      document.body.appendChild(probe);
    }
    const cs=getComputedStyle(probe);
    return {
      t:parseFloat(cs.paddingTop)||0,
      r:parseFloat(cs.paddingRight)||0,
      b:parseFloat(cs.paddingBottom)||0,
      l:parseFloat(cs.paddingLeft)||0
    };
  }catch(e){return {t:0,r:0,b:0,l:0}}
}
function resize(){
  dpr=window.devicePixelRatio||1;
  // Full-bleed: canvas always fills the entire viewport (edge-to-edge).
  // The internal drawing surface stays 390x844 logical so game elements
  // keep their layout, but the CSS box stretches to the device. On phones
  // close to 390:844 ratio the stretch is imperceptible (~1-2%). Crucially,
  // there's no visible body bg strip at top/bottom anymore — the gradient
  // background painted by drawBg() reaches the screen edges, even under
  // notch / status bar / nav bar. UI insets (safeTop/Bottom) are still
  // honored in canvas-coords via the env() probe so nothing draws under
  // system chrome. On iPad letterbox letterboxing was nice, but most users
  // are on phones — the full-bleed look matters more.
  const winW=innerWidth||W,winH=innerHeight||H;
  const cw=winW,ch=winH;
  C.width=W*dpr;C.height=H*dpr;
  C.style.width=cw+'px';C.style.height=ch+'px';
  X.setTransform(dpr,0,0,dpr,0,0);
  scaleY=ch/H||1;
  const sa=_readSafeArea();
  safeTop   =sa.t/scaleY;
  safeBottom=sa.b/scaleY;
  safeLeft  =sa.l/((cw/W)||1);
  safeRight =sa.r/((cw/W)||1);
  _bgCacheDirty=true;
}

// ================================================================
//  AUDIO — Web Audio API (NOT HTML5 <audio>).
// iOS WKWebView treats any HTMLAudioElement as media playback: it hijacks
// AVAudioSession, registers the app on the lock-screen Now Playing widget,
// and routes playback through the codec path (high latency). Web Audio is
// classified as in-app sound, plays through the ambient/mixWithOthers
// category set in AppDelegate, has near-zero latency, and never touches
// Now Playing. The AVAudioSession config in AppDelegate.swift only actually
// takes effect once we stop instantiating <audio>.
// ================================================================
let sndOn=localStorage.getItem('ae_sound')!=='0';
const SND_VOL=0.7;
let audioCtx=null,masterGain=null;
const sndBuf={}; // name -> AudioBuffer (decoded)

function initA(){
  // Must be called from a user-gesture handler on iOS to unlock the context.
  if(audioCtx){
    if(audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});
    return;
  }
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx)return;
    audioCtx=new Ctx();
    masterGain=audioCtx.createGain();
    masterGain.gain.value=SND_VOL;
    masterGain.connect(audioCtx.destination);
    // Decode any buffers fetched before the context existed.
    for(const item of _pendingDecode)_decodeInto(item.name,item.buf);
    _pendingDecode.length=0;
  }catch(e){}
}

// Fetch at startup so bytes are in memory by the time the user taps.
// Decoding waits for the context (created on first tap).
const _pendingDecode=[];
function _decodeInto(name,buf){
  if(!audioCtx)return;
  // decodeAudioData on iOS Safari needs a fresh copy because the ArrayBuffer
  // is detached after the call. We already hold one reference so just pass it.
  audioCtx.decodeAudioData(buf,b=>{sndBuf[name]=b},()=>{});
}
function loadSnd(name,src){
  fetch(src).then(r=>r.arrayBuffer()).then(buf=>{
    if(audioCtx)_decodeInto(name,buf);
    else _pendingDecode.push({name,buf});
  }).catch(()=>{});
}

loadSnd('blocked','sounds/error.mp3');
loadSnd('complete','sounds/new-level.mp3');
loadSnd('gameover','sounds/Game over.mp3');

function playSnd(name){
  if(!sndOn||!audioCtx||!sndBuf[name])return;
  const go=()=>{
    try{
      const src=audioCtx.createBufferSource();
      src.buffer=sndBuf[name];
      src.connect(masterGain);
      src.start(0);
    }catch(e){}
  };
  // If iOS suspended the context (app backgrounded, inactivity), resume is
  // async — we must wait for it to complete before scheduling the buffer,
  // otherwise the first post-toggle play silently drops.
  if(audioCtx.state==='suspended')audioCtx.resume().then(go).catch(()=>{});
  else go();
}

// Spawn a floating "+N" text for a coin reward — quick reward feedback
function spawnFloater(x,y,text,color){
  floaters.push({x,y,text,col:color||TH.star,t:0,dur:1.4});
}
function drawFloaters(){
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i];
    f.t+=1/60;
    if(f.t>=f.dur){floaters.splice(i,1);continue}
    const p=f.t/f.dur;
    const alpha=p<.15?p/.15:(p>.75?(1-p)/.25:1);
    const offY=-p*56;
    X.save();
    X.globalAlpha=max(0,alpha);
    txtP(f.text,f.x,f.y+offY,17,f.col);
    X.restore();
  }
}

const adsRemoved=false;
const INTERSTITIAL_INTERVAL=300; // seconds between interstitials (5 min)
// Initialized so the FIRST interstitial trigger is allowed instead of being
// suppressed by the cool-down (which compares against gt — game-time seconds
// since boot — that starts at 0).
let lastInterstitialTime=-INTERSTITIAL_INTERVAL;
let adRewardCallback=null; // callback after rewarded ad completes

// Real AdMob integration via @capacitor-community/admob
// Per-platform ad unit IDs. iOS IDs are placeholders — Google's official test
// IDs that always serve a test ad. Replace with real iOS unit IDs from the
// AdMob console when ready (search for "REPLACE_IOS_" below).
const _isIOS=()=>typeof Capacitor!=='undefined'&&Capacitor.getPlatform&&Capacitor.getPlatform()==='ios';
const REWARDED_ID =()=>_isIOS()
  ? 'ca-app-pub-1164170950110129/3890476871'  /* iOS Rewarded — real */
  : 'ca-app-pub-1164170950110129/7243043308';  /* Android Rewarded — real */
const INTERSTITIAL_ID=()=>_isIOS()
  ? 'ca-app-pub-1164170950110129/8951231862'  /* iOS Interstitial — real */
  : 'ca-app-pub-1164170950110129/6672197661';  /* Android Interstitial — real */

let admobReady=false;
let _rewardedPrepared=false;
let _interstitialPrepared=false;
function _logAdErr(stage,e){
  try{localStorage.setItem('ae_admob_err',stage+': '+String((e&&e.message)||e));}catch(_){}
}
async function initAdMob(){
  try{
    if(typeof Capacitor==='undefined'||!Capacitor.Plugins.AdMob)return;
    const AdMob=Capacitor.Plugins.AdMob;

    // On iOS: explicitly request ATT permission FIRST, BEFORE initializing AdMob.
    // Apple rejected v1.0 because the ATT prompt was missing. The plugin's
    // built-in `requestTrackingAuthorization: true` flag inside .initialize()
    // doesn't reliably show the prompt on iPadOS 26+. Calling the dedicated
    // method explicitly works, and we wait for the user response before init
    // so SDK telemetry never goes out before the user has answered.
    if(_isIOS()){
      try{
        const status=await AdMob.trackingAuthorizationStatus();
        if(status&&status.status==='notDetermined'){
          await AdMob.requestTrackingAuthorization();
        }
      }catch(e){/* method may not exist in older plugin versions — fall through */}
    }

    await AdMob.initialize({
      initializeForTesting:false,
      requestTrackingAuthorization:false  // already handled explicitly above
    });

    // CRITICAL: mark SDK ready as soon as initialize() succeeds. The PREVIOUS
    // build only flipped this flag after both prepareRewardVideoAd AND
    // prepareInterstitial succeeded — and on a fresh AdMob account or with
    // a transient "no fill" response, prepare throws → admobReady stays
    // false forever → showRewardedAd silently grants the reward without
    // ever attempting to show an ad. That's the bug shipped in 1.0.6.
    admobReady=true;

    // Prepare ads in the background. On failure we'll lazily re-prepare in
    // showRewardedAd / showInterstitialAd.
    AdMob.prepareRewardVideoAd({adId:REWARDED_ID(),isTesting:false})
      .then(()=>{_rewardedPrepared=true})
      .catch(e=>_logAdErr('prepareRewarded',e));
    AdMob.prepareInterstitial({adId:INTERSTITIAL_ID(),isTesting:false})
      .then(()=>{_interstitialPrepared=true})
      .catch(e=>_logAdErr('prepareInterstitial',e));

    // Listen for reward — fired after the user watches the full rewarded ad.
    AdMob.addListener('onRewardedVideoAdReward',()=>{
      if(adRewardCallback)adRewardCallback();
      adRewardCallback=null;
    });
    // Re-prepare after close. Also clear adRewardCallback — if the user
    // dismissed without earning the reward, the callback must NOT fire later.
    AdMob.addListener('onRewardedVideoAdDismissed',()=>{
      adRewardCallback=null;
      _rewardedPrepared=false;
      AdMob.prepareRewardVideoAd({adId:REWARDED_ID(),isTesting:false})
        .then(()=>{_rewardedPrepared=true}).catch(()=>{});
    });
    AdMob.addListener('onInterstitialAdDismissed',()=>{
      _interstitialPrepared=false;
      AdMob.prepareInterstitial({adId:INTERSTITIAL_ID(),isTesting:false})
        .then(()=>{_interstitialPrepared=true}).catch(()=>{});
    });
  }catch(e){_logAdErr('init',e)}
}

// Defer AdMob init until AFTER the splash screen has dismissed and the
// WebView is fully visible — Apple requires the ATT prompt to appear in the
// foreground after the app's UI is rendered, never during launch/splash.
function _scheduleAdMobInit(){
  // 1.5s gives the Capacitor splash time to fade and the WebView to attach.
  setTimeout(initAdMob,1500);
}
if(document.readyState==='complete') _scheduleAdMobInit();
else window.addEventListener('load',_scheduleAdMobInit);

let _adInFlight=false;
async function showRewardedAd(onReward){
  // Browser / no plugin — give reward immediately so dev/web testing works.
  // On a REAL device with admobReady=false, we now refuse instead of granting
  // the reward, so users can't farm coins by tapping when ads are down.
  if(typeof Capacitor==='undefined'||!Capacitor.Plugins.AdMob){
    if(onReward)onReward();
    return;
  }
  if(!admobReady){
    // SDK init didn't complete (rare). Tell user, don't grant.
    spawnFloater(W/2,H/2,t('adUnavailable'),TH.arrowBlock);
    return;
  }
  // Anti-double-tap: spammy taps on the rewarded button used to register
  // multiple concurrent showRewardedAd calls → multiple rewards on a single
  // ad view. Block while one ad is mid-flight.
  if(_adInFlight)return;
  _adInFlight=true;
  const AdMob=Capacitor.Plugins.AdMob;
  // Wrap the caller's reward in a one-shot so even if dismiss + reward
  // listeners both fire, the player only gets one payout.
  let rewardFired=false;
  const safeReward=()=>{if(rewardFired)return;rewardFired=true;if(onReward)onReward()};
  adRewardCallback=safeReward;
  try{
    if(!_rewardedPrepared){
      await AdMob.prepareRewardVideoAd({adId:REWARDED_ID(),isTesting:false});
      _rewardedPrepared=true;
    }
    await AdMob.showRewardVideoAd();
    // Reward / dismiss listeners take it from here.
  }catch(e){
    _logAdErr('showRewarded',e);
    // Try ONE on-demand prepare+show retry — e.g., the cached ad expired.
    try{
      await AdMob.prepareRewardVideoAd({adId:REWARDED_ID(),isTesting:false});
      _rewardedPrepared=true;
      await AdMob.showRewardVideoAd();
    }catch(e2){
      _logAdErr('showRewardedRetry',e2);
      // Genuinely no ad available — DO NOT grant reward (anti-farm). Tell
      // the user instead. Clear the pending callback so a future ad's
      // listener doesn't fire it.
      adRewardCallback=null;
      spawnFloater(W/2,H/2,t('adUnavailable'),TH.arrowBlock);
    }
  }finally{
    // Released after the ad closes (catch path) OR on the next tick after
    // showRewardVideoAd resolves — the dismiss listener runs separately so
    // we release the gate immediately. Worst case a second ad starts while
    // the first is still on screen, but iOS only ever shows one at a time.
    _adInFlight=false;
  }
}
async function showInterstitialAd(){
  if(adsRemoved)return;
  const now=gt;
  if(now-lastInterstitialTime<INTERSTITIAL_INTERVAL)return;
  lastInterstitialTime=now;
  if(!admobReady||typeof Capacitor==='undefined'||!Capacitor.Plugins.AdMob)return;
  const AdMob=Capacitor.Plugins.AdMob;
  try{
    if(!_interstitialPrepared){
      await AdMob.prepareInterstitial({adId:INTERSTITIAL_ID(),isTesting:false});
      _interstitialPrepared=true;
    }
    await AdMob.showInterstitial();
  }catch(e){
    _logAdErr('showInterstitial',e);
    // Don't retry interstitials — they're noisy and timed; just skip this slot.
  }
}
function useHint(){
  if(coins<HINT_COST||hintTime>0)return false;
  for(let i=0;i<arrows.length;i++){
    if(arrows[i].alive&&canEscape(i)){
      hintArrow=i;
      hintTime=2.5;
      coins-=HINT_COST;
      hintUsedThisLevel=true; // disqualifies this level from "no hint" stat
      save();
      sfx.tap();haptic(15);
      return true;
    }
  }
  return false;
}

// Continue from game over — spend coins to restore hearts, keep arrow progress
function continueFromGameover(){
  if(coins<CONTINUE_COST)return false;
  coins-=CONTINUE_COST;
  undosLeft=3;
  save();
  S='play';
  sfx.tap();haptic(10);
  return true;
}

// Skip current level for a fat coin cost — marks 1 star and advances
function skipLevel(){
  if(coins<SKIP_COST||isDaily)return false;
  coins-=SKIP_COST;
  stars[level]=max(stars[level]||0,1);
  totalStars=Object.values(stars).reduce((a,b)=>a+b,0);
  level++;
  save();
  sfx.complete();haptic(20);
  generateLevel(level);
  return true;
}

// ================================================================
//  LEVEL GENERATION
// ================================================================
function seededRandom(seed){
  let s=seed;
  return function(){s=(s*16807)%2147483647;return(s-1)/2147483646};
}

// Generate a level using the REAL mechanic: arrows are multi-cell random-walk paths.
// Solvability is guaranteed by placing arrows in REVERSE solve order:
//   arrow[0] will be removed first, arrow[N-1] last. Place them backward:
//   first place arrow[N-1] (unconstrained), then arrow[N-2] needs a clear escape
//   past arrow[N-1], etc. At solve time, each arrow's escape path is clear of
//   the arrows that haven't been removed yet.
function generateLevel(lvl,customSeed){
  const rng=seededRandom(customSeed!=null?customSeed:(lvl*7919+31337));
  hintArrow=-1;hintTime=0;wrongTapsInLevel=0;
  hintUsedThisLevel=false;
  levelRevealT=0;
  updateStreak();

  // Unlimited levels. Difficulty ramps from level 1 to ~500, then stays at max.
  // Level 1 = gentle intro (8×11, ~15 arrows, big cells).
  // Level 500+ = extreme dense maze (34×48, ~300+ arrows, tiny cells).
  // Arrowheads ALWAYS visible — complexity comes from density, not hidden info.
  const p=min(1,(lvl-1)/499);
  const cols=floor(lrp(8,24,p)+.5);
  const rows=floor(lrp(11,32,p)+.5);
  const minLen=2; // always accept short arrows to fill tight spaces
  const maxLen=floor(lrp(8,30,p)+.5); // longer max = more space filled per arrow

  gridCols=cols;gridRows=rows;

  // occ[r][c] = arrow index that owns this cell, or -1
  const occ=[];
  for(let r=0;r<rows;r++){occ[r]=[];for(let c=0;c<cols;c++)occ[r][c]=-1}

  const placed=[];

  // Pass 1: long arrows with turns — the main visual content
  let safety=3000;
  while(safety-->0){
    const arrow=tryBuildArrow(occ,rows,cols,rng,minLen,maxLen);
    if(!arrow)break;
    for(const[r,c] of arrow.cells)occ[r][c]=placed.length;
    placed.push(arrow);
  }

  // Pass 2: short 2-3 cell fillers for medium gaps
  safety=3000;
  while(safety-->0){
    const arrow=tryBuildArrow(occ,rows,cols,rng,2,3);
    if(!arrow)break;
    for(const[r,c] of arrow.cells)occ[r][c]=placed.length;
    placed.push(arrow);
  }

  // Pass 3: 1-cell arrows with valid escape lines (guaranteed solvable)
  safety=3000;
  while(safety-->0){
    const arrow=tryBuildArrow(occ,rows,cols,rng,1,1);
    if(!arrow)break;
    for(const[r,c] of arrow.cells)occ[r][c]=placed.length;
    placed.push(arrow);
  }

  // Reverse so arrows[0] = first solved
  arrows=placed.reverse();
  for(const a of arrows)a.alive=true;

  minMoves=arrows.length;
  moves=0;
  timer=0;
  undosLeft=3;

  const key='ae_best_'+lvl;
  bestTime=+localStorage.getItem(key)||0;
}

// Build one arrow by EXHAUSTIVE candidate search.
// Special case: when minLen==1 && maxLen==1, build a single-cell arrow (just a
// head with a direction). Used in the gap-fill pass to plug isolated empties.
function tryBuildArrow(occ,rows,cols,rng,minLen,maxLen){
  const oneCell=(minLen===1&&maxLen===1);
  const candidates=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(occ[r][c]!==-1)continue;
      for(let d=0;d<4;d++){
        // For multi-cell arrows we need a free cell behind the head too.
        if(!oneCell){
          const bd=(d+2)%4;
          const br=r+DY[bd],bc=c+DX[bd];
          if(br<0||br>=rows||bc<0||bc>=cols)continue;
          if(occ[br][bc]!==-1)continue;
        }
        // Escape line from head to grid edge must be clear of existing arrows
        let clear=true;
        let cr=r+DY[d],cc=c+DX[d];
        while(cr>=0&&cr<rows&&cc>=0&&cc<cols){
          if(occ[cr][cc]!==-1){clear=false;break}
          cr+=DY[d];cc+=DX[d];
        }
        if(!clear)continue;
        // Score:
        //   +1.5 per neighbor already occupied → tight packing (cluster grows)
        //   -0.12 × Chebyshev distance from center → seed the first arrow near
        //   the middle of the grid so the cluster has room to expand outward
        //   in all directions (prevents hollow-center effect).
        let s=rng();
        for(let dd=0;dd<4;dd++){
          const nr=r+DY[dd],nc=c+DX[dd];
          if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&occ[nr][nc]!==-1)s+=1.5;
        }
        const cR=(rows-1)/2,cC=(cols-1)/2;
        const distCenter=max(abs(r-cR),abs(c-cC));
        s-=distCenter*.12;
        candidates.push({hr:r,hc:c,dir:d,s});
      }
    }
  }
  if(candidates.length===0)return null;
  candidates.sort((a,b)=>b.s-a.s);

  // Single-cell arrow shortcut: return the best candidate immediately
  if(oneCell){
    const best=candidates[0];
    return{cells:[[best.hr,best.hc]],dir:best.dir};
  }

  for(const cand of candidates){
    const{hr,hc,dir}=cand;
    const bd=(dir+2)%4;
    const br0=hr+DY[bd],bc0=hc+DX[bd];

    // Always target the maximum length. Growth stops naturally when all
    // neighbors are blocked, so short paths only happen in tight corners.
    const targetLen=maxLen;
    const cells=[[br0,bc0],[hr,hc]];
    const used=new Set();
    used.add(hr+','+hc);
    used.add(br0+','+bc0);
    let br=br0,bc=bc0;
    let lastStepDir=bd;
    let straightRun=1;

    while(cells.length<targetLen){
      const opts=[];
      for(let d=0;d<4;d++){
        const nr=br+DY[d],nc=bc+DX[d];
        if(nr<0||nr>=rows||nc<0||nc>=cols)continue;
        if(occ[nr][nc]!==-1)continue;
        if(used.has(nr+','+nc))continue;
        if(onEscapeLine(nr,nc,hr,hc,dir))continue;
        opts.push({r:nr,c:nc,d});
      }
      if(opts.length===0)break;
      const scored=opts.map(({r,c,d})=>{
        let s=rng();
        // Proximity bonus: +2.0 per occupied neighbor → paths hug existing arrows
        let occupied=[false,false,false,false];
        for(let dd=0;dd<4;dd++){
          const nr=r+DY[dd],nc=c+DX[dd];
          if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&occ[nr][nc]!==-1){
            s+=2.0;
            occupied[dd]=true;
          }
        }
        // Sandwich bonus: occupied on OPPOSITE sides → path threads a corridor
        if(occupied[0]&&occupied[2])s+=2.5; // right + left
        if(occupied[1]&&occupied[3])s+=2.5; // up + down
        // Turn bonus: prefer changing direction after 1-2 straight steps
        if(d!==lastStepDir)s+=1.6;
        else if(straightRun>=2)s-=1.2;
        return{cell:[r,c],d,s};
      });
      scored.sort((a,b)=>b.s-a.s);
      const pick=scored[0];
      cells.unshift(pick.cell);
      used.add(pick.cell[0]+','+pick.cell[1]);
      br=pick.cell[0];bc=pick.cell[1];
      if(pick.d===lastStepDir)straightRun++;else{straightRun=1;lastStepDir=pick.d}
    }

    if(cells.length>=minLen)return{cells,dir};
  }
  return null;
}

// Is (r,c) on the escape line of an arrow with head (hr,hc) in direction dir?
function onEscapeLine(r,c,hr,hc,dir){
  let cr=hr+DY[dir],cc=hc+DX[dir];
  while(cr>=0&&cr<gridRows&&cc>=0&&cc<gridCols){
    if(cr===r&&cc===c)return true;
    cr+=DY[dir];cc+=DX[dir];
  }
  return false;
}

// ================================================================
//  GAME ACTIONS
// ================================================================
// Check if arrow[idx] can escape — head cell walks in arrow.dir to grid edge,
// path must not contain cells of any OTHER alive arrow.
function canEscape(idx){
  const a=arrows[idx];
  if(!a||!a.alive)return false;
  const head=a.cells[a.cells.length-1];
  let cr=head[0]+DY[a.dir],cc=head[1]+DX[a.dir];
  while(cr>=0&&cr<gridRows&&cc>=0&&cc<gridCols){
    for(let j=0;j<arrows.length;j++){
      if(j===idx||!arrows[j].alive)continue;
      for(const[or,oc] of arrows[j].cells){
        if(or===cr&&oc===cc)return false;
      }
    }
    cr+=DY[a.dir];cc+=DX[a.dir];
  }
  return true;
}

// Compute total arc length of an arrow path in pixels (cell-center to cell-center).
// Single-cell arrows get a synthetic body length so the animation has something to render.
function arrowBodyLen(a,cs){
  if(a.cells.length===1)return cs*.38;
  let len=0;
  for(let i=0;i<a.cells.length-1;i++){
    const dr=a.cells[i+1][0]-a.cells[i][0];
    const dc=a.cells[i+1][1]-a.cells[i][1];
    len+=sqrt(dr*dr+dc*dc)*cs;
  }
  return len;
}

// Build world-space extended path for an arrow: polyline through cell centers +
// a long straight extension in the exit direction past the head.
// Single-cell arrows get a synthetic tail point behind the head in backDir.
function buildArrowWorldPath(a,cs,gx,gy){
  const pts=[];
  for(const[r,c] of a.cells)pts.push([gx+c*cs+cs/2,gy+r*cs+cs/2]);
  if(pts.length===1){
    const bd=(a.dir+2)%4;
    const h=pts[0];
    pts.unshift([h[0]+DX[bd]*cs*.38,h[1]+DY[bd]*cs*.38]);
  }
  const head=pts[pts.length-1];
  pts.push([head[0]+DX[a.dir]*1600,head[1]+DY[a.dir]*1600]);
  return pts;
}

function tapArrowByIndex(idx){
  // Guard: block taps during the brief transition window after game-over /
  // level-complete (a setTimeout flips state in 500ms). Without this, the
  // user can tap further arrows in those 500ms and corrupt the post-state.
  if(inputLocked)return;
  const a=arrows[idx];
  if(!a||!a.alive)return;

  if(canEscape(idx)){
    a.alive=false;
    moves++;

    const cs=getCellSize(),gx=getGridX(),gy=getGridY();
    const bodyLen=arrowBodyLen(a,cs);
    const extLen=1600;
    // Pre-build the polyline ONCE per anim (was rebuilt every frame in the
    // draw loop — main cause of lag during a chain of arrow exits).
    const path=buildArrowWorldPath(a,cs,gx,gy);
    anims.push({
      arrow:a,
      dir:a.dir,
      t:0,dur:1.2,
      col:TH.arrow,cs,gx,gy,
      bodyLen,totalDist:bodyLen+extLen,
      path,
    });
    sfx.swoosh(a.dir);haptic(10);

    // Win check
    let allGone=true;
    for(const ar of arrows)if(ar.alive){allGone=false;break}
    if(allGone){
      inputLocked=true;
      setTimeout(()=>{
        inputLocked=false;
        S='complete';
        sfx.complete();haptic(30);
        const s=max(1,undosLeft);
        const perfect=(s===3);
        let gained=0;
        if(isWeekly){
          if(!isWeeklyDone()){
            gained=WEEKLY_REWARD;
            localStorage.setItem(weeklyDoneKey(),'1');
          }
        }else if(isDaily){
          if(!isDailyDone()){
            gained=DAILY_REWARD;
            localStorage.setItem(dailyDoneKey(),'1');
            totalDailies++;
          }
        }else{
          const wasNewStars=(stars[level]||0)<s;
          stars[level]=max(stars[level]||0,s);
          totalStars=Object.values(stars).reduce((a,b)=>a+b,0);
          gained=5+s*5;
          const key='ae_best_'+level;
          const prev=+localStorage.getItem(key)||99999;
          if(timer<prev)localStorage.setItem(key,floor(timer));
          bestTime=min(prev,floor(timer));
          if(undosLeft===3)streak++;else streak=0;
          if(wasNewStars&&perfect)totalPerfect++;
          if(wasNewStars&&!hintUsedThisLevel)noHintCount++;
          fastestLevel=min(fastestLevel,floor(timer));
        }
        coins+=gained;
        totalCoinsEarned+=gained;
        if(gained>0)spawnFloater(W/2,H*.58,'+'+gained);
        checkAchievements({
          level,stars:s,totalStars,streakDays,coins,perfect,isDaily,
          totalPerfect,totalDailies,noHintCount,fastestLevel
        });
        save();
        spawnConfetti();
      },400);
    }
  }else{
    // Blocked — shake the head cell, lose a heart (life)
    const cs=getCellSize(),gx=getGridX(),gy=getGridY();
    const head=a.cells[a.cells.length-1];
    const sx=gx+head[1]*cs+cs/2;
    const sy=gy+head[0]*cs+cs/2;
    shakeAnims.push({x:sx,y:sy,idx,t:0,dur:.2});
    sfx.blocked();haptic([5,30,5]);
    undosLeft--;
    // Visual feedback: floating "-1 ❤" near the head
    spawnFloater(sx,sy-cs*.6,'-1',TH.arrowBlock);
    if(undosLeft<=0){
      inputLocked=true;
      setTimeout(()=>{S='gameover';sfx.gameover();inputLocked=false},500);
    }
  }
}

// Grid fills almost the entire screen width. Minimal 8px padding per side.
function getCellSize(){return min((W-16)/gridCols,(H*.70)/gridRows)}
function getGridX(){return(W-gridCols*getCellSize())/2}

// ================================================================

// ================================================================
function txt(t,x,y,sz,col,align,font){
  X.font=`${font||'600'} ${sz}px ${font==='Poppins'?'Poppins':'Nunito'},sans-serif`;
  X.fillStyle=col||TH.text;X.textAlign=align||'center';X.textBaseline='middle';
  X.fillText(t,x,y);
}
function txtP(t,x,y,sz,col,align){txt(t,x,y,sz,col,align,'700')}

function drawArrow(x,y,dir,sz,col,alpha){
  // Simple straight arrow (used for menu animation and flying arrows)
  const angles=[0,-PI/2,PI,PI/2];
  const a=angles[dir];
  const len=sz*.30;
  const headW=sz*.11;
  const headL=sz*.13;
  X.save();X.translate(x,y);X.rotate(a);
  X.globalAlpha=alpha||1;
  const c=col||TH.arrow;
  X.strokeStyle=c;X.lineWidth=max(1.8,sz*.035);X.lineCap='round';
  X.beginPath();X.moveTo(-len,0);X.lineTo(len-headL,0);X.stroke();
  X.fillStyle=c;X.beginPath();
  X.moveTo(len,0);X.lineTo(len-headL,-headW);X.lineTo(len-headL,headW);
  X.closePath();X.fill();
  X.globalAlpha=1;
  X.restore();
}

// Extract a polyline segment from a path between arc positions sFrom and sTo.
// Used by the slide animation to render partial arrows as they travel.
function getPathSegment(path,sFrom,sTo){
  const pts=[];
  let acc=0,started=false;
  for(let i=0;i<path.length-1;i++){
    const x1=path[i][0],y1=path[i][1],x2=path[i+1][0],y2=path[i+1][1];
    const dx=x2-x1,dy=y2-y1;
    const segLen=sqrt(dx*dx+dy*dy);
    if(segLen===0)continue;
    const segEnd=acc+segLen;
    if(!started&&segEnd>sFrom){
      const t=max(0,(sFrom-acc)/segLen);
      pts.push([x1+dx*t,y1+dy*t]);
      started=true;
    }
    if(started){
      if(segEnd>=sTo){
        const t=(sTo-acc)/segLen;
        pts.push([x1+dx*t,y1+dy*t]);
        return pts;
      }
      pts.push([x2,y2]);
    }
    acc=segEnd;
  }
  return pts;
}

// Draw an arrow as a continuous polyline through a list of world-space points,
// with a triangular head at the end pointing in the direction of the last segment.
// Used for both static rendering and animation (via getPathSegment clipping).
function drawArrowPolyline(pts,sz,col,alpha){
  if(pts.length<2)return;
  // Thin lines scaled to cell size. Min 2px keeps lines visible at tiny cells.
  const thick=max(1.5,sz*.10);
  const headL=sz*.32,headW=sz*.22;

  X.save();
  X.globalAlpha=alpha==null?1:alpha;

  // Determine head direction from last body segment
  const last=pts[pts.length-1],prev=pts[pts.length-2];
  const hdx=last[0]-prev[0],hdy=last[1]-prev[1];
  const hlen=sqrt(hdx*hdx+hdy*hdy)||1;
  const nx=hdx/hlen,ny=hdy/hlen;

  // Pull line endpoint back by headL so triangle covers the line end cleanly
  const modPts=pts.slice();
  const k=min(1,headL/hlen);
  modPts[modPts.length-1]=[last[0]-nx*hlen*k,last[1]-ny*hlen*k];

  // Line body: thick, rounded caps and joins for smooth maze-like paths
  X.strokeStyle=col;
  X.lineWidth=thick;
  X.lineCap='round';
  X.lineJoin='round';
  X.beginPath();
  X.moveTo(modPts[0][0],modPts[0][1]);
  for(let i=1;i<modPts.length;i++)X.lineTo(modPts[i][0],modPts[i][1]);
  X.stroke();

  // Triangular arrowhead at the head (tip at `last`, base extending backward)
  const pxv=-ny,pyv=nx;
  const tipX=last[0],tipY=last[1];
  const baseX=tipX-nx*headL,baseY=tipY-ny*headL;
  X.fillStyle=col;
  X.beginPath();
  X.moveTo(tipX,tipY);
  X.lineTo(baseX+pxv*headW,baseY+pyv*headW);
  X.lineTo(baseX-pxv*headW,baseY-pyv*headW);
  X.closePath();
  X.fill();

  X.globalAlpha=1;
  X.restore();
}

// Draw a static arrow (used in the grid) — full path from tail to head.
// Single-cell arrows synthesize a short tail behind the head so the arrowhead
// has something to sit on.
function drawArrowStatic(arrow,cs,gx,gy,col,alpha,shakeOff){
  const pts=[];
  for(const[r,c] of arrow.cells){
    let x=gx+c*cs+cs/2,y=gy+r*cs+cs/2;
    if(shakeOff){x+=shakeOff}
    pts.push([x,y]);
  }
  if(pts.length===1){
    const bd=(arrow.dir+2)%4;
    const h=pts[0];
    pts.unshift([h[0]+DX[bd]*cs*.38,h[1]+DY[bd]*cs*.38]);
  }
  drawArrowPolyline(pts,cs,col,alpha);
}

// Check if this button is currently being pressed (scale feedback)
function btnPressScale(x,y,w,h){
  if(!lastClick)return 1;
  const dt=gt-lastClick.t;
  if(dt>.18)return 1;
  if(abs(lastClick.x-x)>w/2||abs(lastClick.y-y)>h/2)return 1;
  // Ease-out over 0.18s: scale dips to 0.95 then back to 1.0
  const p=dt/.18;
  const dip=sin(p*PI);
  return 1-dip*.05;
}

// Background with soft gradient + colored light blobs. Cached to an offscreen
// canvas so we don't recreate 4 gradient objects per frame (was the main lag
// source — gradient allocation on iOS WebKit is expensive).
let _bgCache=null,_bgCacheDark=null;
function _renderBg(dark){
  const cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  const x=cv.getContext('2d');
  if(!x)return null;
  const bg=x.createLinearGradient(0,0,0,H);
  if(dark){bg.addColorStop(0,'#24244a');bg.addColorStop(1,'#15152a');}
  else{bg.addColorStop(0,'#faf7f1');bg.addColorStop(1,'#ece6d8');}
  x.fillStyle=bg;x.fillRect(0,0,W,H);
  x.save();
  x.globalAlpha=dark?.35:.22;
  const b1=x.createRadialGradient(W*.85,H*.12,0,W*.85,H*.12,W*.7);
  b1.addColorStop(0, dark?'#d48a4a':'#d4aa4a');b1.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=b1;x.fillRect(0,0,W,H);
  const b2=x.createRadialGradient(W*.1,H*.85,0,W*.1,H*.85,W*.8);
  b2.addColorStop(0, dark?'#5a7aaa':'#7a9cc8');b2.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=b2;x.fillRect(0,0,W,H);
  const b3=x.createRadialGradient(W*.7,H*.55,0,W*.7,H*.55,W*.55);
  b3.addColorStop(0, dark?'#a66090':'#e88aa8');b3.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=b3;x.fillRect(0,0,W,H);
  x.restore();
  return cv;
}
function drawBg(){
  if(_bgCacheDirty||_bgCacheDark!==darkMode){
    _bgCache=_renderBg(darkMode);
    _bgCacheDark=darkMode;
    _bgCacheDirty=false;
  }
  // Fallback: if cache failed (e.g. WebKit refused offscreen canvas alloc),
  // draw a solid background so the screen isn't blank.
  if(_bgCache){X.drawImage(_bgCache,0,0,W,H);}
  else{X.fillStyle=darkMode?'#1a1a2e':'#f5f2ed';X.fillRect(0,0,W,H);}
}

// iOS 26 "Liquid Glass" overlay. Tuned separately for light & dark themes.
// Cached per (w, h, r, dark) — buttons of the same size share the same render,
// blitted via drawImage. This is the single biggest win for the menu screen
// where 6+ same-sized buttons are drawn 60×/sec. Cache is invalidated when
// theme toggles. Cache size is bounded by the small set of distinct sizes.
function _renderGlass(w,h,r,dark){
  const cv=document.createElement('canvas');
  cv.width=Math.ceil(w);cv.height=Math.ceil(h);
  const x=cv.getContext('2d');
  if(!x)return null;
  const rr=max(0,r-.5);
  x.save();
  x.beginPath();x.roundRect(0,0,w,h,r);x.clip();
  x.fillStyle=dark?'rgba(255,255,255,.18)':'rgba(255,255,255,.22)';
  x.fillRect(0,0,w,h);
  const g1=x.createLinearGradient(0,0,0,h*.5);
  g1.addColorStop(0,'rgba(255,255,255,'+(dark?'.95':'1')+')');
  g1.addColorStop(.35,'rgba(255,255,255,.25)');
  g1.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g1;x.fillRect(0,0,w,h*.5);
  const g2=x.createLinearGradient(0,h*.4,0,h);
  g2.addColorStop(0,'rgba(0,0,0,0)');
  g2.addColorStop(1,'rgba(0,0,0,'+(dark?'.4':'.11')+')');
  x.fillStyle=g2;x.fillRect(0,h*.4,w,h*.6);
  const g3=x.createLinearGradient(0,h*.78,0,h);
  g3.addColorStop(0,'rgba(255,255,255,0)');
  g3.addColorStop(1,'rgba(255,255,255,'+(dark?'.55':'.65')+')');
  x.fillStyle=g3;x.fillRect(0,h*.78,w,h*.22);
  x.restore();
  x.save();
  x.beginPath();x.rect(0,0,w,h*.5);x.clip();
  x.beginPath();x.roundRect(.75,.75,w-1.5,h-1.5,max(0,r-.75));
  x.strokeStyle='rgba(255,255,255,1)';x.lineWidth=1.5;x.stroke();
  x.restore();
  x.save();
  x.beginPath();x.rect(0,h*.6,w,h*.4);x.clip();
  x.beginPath();x.roundRect(.5,.5,w-1,h-1,rr);
  x.strokeStyle='rgba(255,255,255,'+(dark?'.7':'.8')+')';x.lineWidth=1;x.stroke();
  x.restore();
  return cv;
}
// Glass overlay disabled per UX feedback — looked muddy in dark mode and felt
// "uneven" in both themes. Kept as a no-op so existing call sites stay valid.
function glass(x,y,w,h,r){}
function _clearGlassCache(){_glassCache.clear();}

// True when a modal/overlay is on top — buttons under must NOT consume the
// tap (the overlay needs it). Also disables their hover state for clarity.
function _inputBlocked(){return langPickerOpen}

function drawBtn(label,x,y,w,h,color){

function drawStar(x,y,sz,filled){

  X.beginPath();
  for(let i=0;i<5;i++){

    X.lineTo(cos(a1)*sz,sin(a1)*sz);

  X.closePath();
  if(filled){X.fillStyle=TH.star;X.fill()}
  else{X.strokeStyle=TH.star+'40';X.lineWidth=1;X.stroke()}

}

// Render a proper-looking coin: yellow disk + dark inner ring + highlight shine
function drawCoin(x,y,r){
  // Outer shadow for depth
  X.fillStyle=darkMode?'rgba(0,0,0,.35)':'rgba(80,55,0,.25)';
  X.beginPath();X.arc(x+r*.12,y+r*.15,r,0,TAU);X.fill();
  // Main disk
  X.fillStyle=TH.star;
  X.beginPath();X.arc(x,y,r,0,TAU);X.fill();
  // Inner ring
  X.strokeStyle=darkMode?'rgba(0,0,0,.45)':'rgba(120,85,0,.55)';
  X.lineWidth=max(.8,r*.18);

  X.fillStyle='rgba(255,255,255,.55)';
  X.beginPath();X.arc(x-r*.32,y-r*.32,r*.24,0,TAU);X.fill();
}

    a.x+=DX[a.dir]*a.spd*(1/60);
    a.y+=DY[a.dir]*a.spd*(1/60);
    // Fade in first 20%, full middle, fade out last 20%
    const lp=a.life%1;
    const fade=lp<.2?lp/.2:(lp>.8?(1-lp)/.2:1);
    X.globalAlpha=a.alpha*fade;
    drawArrow(a.x,a.y,a.dir,a.sz,TH.arrow,a.alpha*fade);
    X.globalAlpha=1;
    // Reset when lifecycle ends or goes off screen
    if(a.life>=1||a.x<-60||a.x>W+60||a.y<-60||a.y>H+60){
      a.x=rnd(40,W-40);a.y=rnd(40,H-40);
      a.dir=rndI(0,3);a.sz=rnd(25,55);a.spd=rnd(12,35);
      a.life=0;a.dur=rnd(4,8);a.alpha=rnd(.08,.18);
    }
  }
  } // end !reducedMotion bg arrows

  // Title — moved further down (clear of dynamic island + breathing room
  // for the heavier stats panel below)
  txtP(t('title1'),W/2,H*.16,36,TH.text);
  txtP(t('title2'),W/2,H*.22,36,TH.accent);

  // Stats panel
  const spY=H*.33,spW=300,spH=66;
  X.fillStyle=TH.cardBg;
  X.beginPath();X.roundRect(W/2-spW/2,spY-spH/2,spW,spH,14);X.fill();
  glass(W/2-spW/2,spY-spH/2,spW,spH,14);
  X.strokeStyle=TH.border;X.lineWidth=1;
  X.beginPath();X.roundRect(W/2-spW/2,spY-spH/2,spW,spH,14);X.stroke();
  const col1=W/2-spW/2+spW*.125,col2=W/2-spW/2+spW*.375,col3=W/2-spW/2+spW*.625,col4=W/2-spW/2+spW*.875;
  txtP(t('level'),col1,spY-13,9,TH.textSec);
  txtP(maxLevel+'',col1,spY+9,17,TH.text);
  txtP(t('stars'),col2,spY-13,9,TH.textSec);
  txtP(totalStars+'',col2,spY+9,17,TH.star);
  txtP(t('streak'),col3,spY-13,9,TH.textSec);
  txtP(streakDays+'d',col3,spY+9,17,TH.warning);
  txtP(t('trophy'),col4,spY-13,9,TH.textSec);
  txtP(achUnlockedCount()+'/'+ACHIEVEMENTS.length,col4,spY+9,13,TH.accent);

  // PLAY button — text only, no play-icon (it broke the visual style)
  if(drawBigBtn(t('play'),W/2,H*.58,210,56,TH.accent)){
    goto('play',()=>{isDaily=false;isWeekly=false;level=maxLevel;generateLevel(level)});
  }

  // 2×2 grid of secondary buttons + achievements row
  const bW=138,bH=42,bGapX=16,bGapY=12;
  const gX=W/2,gY1=H*.70,gY2=gY1+bH+bGapY;
  // Row 1
  if(drawBtn(t('levels'),gX-bW/2-bGapX/2,gY1,bW,bH)){
    goto('levels',()=>{levelsPage=floor((level-1)/25)});
  }
  const dailyDone=isDailyDone();
  if(drawBtn(dailyDone?t('daily')+' ★':t('daily'),gX+bW/2+bGapX/2,gY1,bW,bH)){
    goto('play',()=>{isDaily=true;isWeekly=false;dailySeed=getDailySeed();generateLevel(40,dailySeed*31+7)});
    // Daily difficulty pinned at level 40 (medium) so each day is a similar
    // challenge — Wordle/NYT model. Seed varies, complexity stays constant.
  }
  // Row 2
  const weeklyDone=isWeeklyDone();
  if(drawBtn(weeklyDone?t('weekly')+' ★':t('weekly'),gX-bW/2-bGapX/2,gY2,bW,bH,TH.warning)){
    goto('play',()=>{isWeekly=true;isDaily=false;const ws=getWeeklySeed();generateLevel(120,ws*131+71)});
    // Weekly difficulty pinned at level 120 (hard) — bigger reward + bigger maze
  }
  if(drawBtn(t('stats'),gX+bW/2+bGapX/2,gY2,bW,bH)){goto('stats')}
  // Wide achievements button
  if(drawBtn(t('achievements')+' ('+achUnlockedCount()+'/'+ACHIEVEMENTS.length+')',W/2,gY2+bH+bGapY+8,bW*2+bGapX,bH)){

  }

  // Settings gear top-right — y is safe-area-aware so it adapts to any

  X.beginPath();X.arc(gx,gy,10,0,TAU);X.stroke();
  X.fillStyle=ghv?TH.text:TH.textSec;
  X.beginPath();X.arc(gx,gy,3,0,TAU);X.fill();
  // Gear teeth
  for(let i=0;i<6;i++){const a=i*TAU/6+gt*.5;
    X.beginPath();X.arc(gx+cos(a)*10,gy+sin(a)*10,2,0,TAU);X.fill()}
  if(tapped&&abs(tapX-gx)<20&&abs(tapY-gy)<20){sfx.tap();tapped=false;goto('settings')}

  // Coins — nudged slightly below the gear for better visual balance

}

// --- PLAY ---
function drawPlay(){
  drawBg();

  const cs=getCellSize(),gx=getGridX(),gy=getGridY();

  // Top app bar — y derives from device safe-area inset so the row sits
  // just below status bar / Dynamic Island on any iPhone (and Android too).
  // Floor at 65 so non-notched devices still get reasonable padding.
  const TOP_Y=Math.max(65,safeTop+25);

  // Pause/menu button (top-left) — bigger hit area (44×44) per HIG touch target
  const phv=abs(mx-32)<24&&abs(my-TOP_Y)<24;
  // Draw a subtle background card behind the icon so the touch area is obvious
  X.fillStyle=phv?TH.btnHover:TH.btnBg;
  X.beginPath();X.roundRect(32-22,TOP_Y-18,44,36,18);X.fill();
  X.strokeStyle=TH.border;X.lineWidth=1;
  X.beginPath();X.roundRect(32-22,TOP_Y-18,44,36,18);X.stroke();
  txt('≡',32,TOP_Y,22,phv?TH.text:TH.textSec);
  if(tapped&&abs(tapX-32)<24&&abs(tapY-TOP_Y)<24){sfx.tap();tapped=false;goto('menu',()=>{isDaily=false;isWeekly=false});return}

  // Level title (center)
  txt('Level '+level,W/2,TOP_Y,16,TH.text);
  // Stars for this level goal — below the title
  for(let i=0;i<3;i++){
    drawStar(W/2-20+i*20,TOP_Y+22,7,moves<=minMoves+i*1&&i<(moves<=minMoves?3:moves<=minMoves+2?2:1));
  }

  // Hearts = lives (top-right, vertically centered with menu button)
  for(let i=0;i<3;i++){
    const hx=W-26-i*24,hy=TOP_Y;
    const full=i<undosLeft;
    X.fillStyle=full?'#e05555':(darkMode?'rgba(255,255,255,.08)':'rgba(0,0,0,.08)');
    X.save();X.translate(hx,hy);
    X.beginPath();
    X.moveTo(0,3);X.bezierCurveTo(-5,-2,-9,-1,-9,3);X.bezierCurveTo(-9,8,0,12,0,12);
    X.bezierCurveTo(0,12,9,8,9,3);X.bezierCurveTo(9,-1,5,-2,0,3);
    X.fill();X.restore();
  }

  // Advance level reveal animation (staggered fade-in of all arrows)
  if(levelRevealT<1)levelRevealT=min(1,levelRevealT+1/60/.9);

  // Draw all alive arrows as continuous paths through their cells
  for(let i=0;i<arrows.length;i++){
    const a=arrows[i];
    if(!a.alive)continue;

    // Reveal alpha: each arrow fades in with a small offset based on index
    let revealA=1;
    if(levelRevealT<1){
      const perArrowOffset=0.5/max(1,arrows.length);
      const start=i*perArrowOffset;
      revealA=clp((levelRevealT-start)/0.5,0,1);
      if(revealA<=0)continue;
    }

    // Check if shaking (blocked feedback on head cell)
    let shakeOff=0,isShaking=false;
    for(const sh of shakeAnims){
      if(sh.idx===i){
        const p=sh.t/sh.dur;
        shakeOff=sin(p*PI*6)*4*(1-p);
        isShaking=true;
      }
    }

    // Hint highlight: cheap pulse via globalAlpha + slightly larger stroke
    // overlay instead of shadowBlur (which was a major perf hit on iOS WebKit
    // — every alive arrow burned GPU bandwidth even when only one was hinted).
    if(i===hintArrow&&hintTime>0&&!reducedMotion){
      const pulse=.5+.5*sin(gt*6);
      X.save();
      X.globalAlpha=(.4+pulse*.5)*revealA;
      drawArrowStatic(a,cs,gx,gy,TH.star,1,shakeOff);
      X.restore();
    }

    const col=isShaking?TH.arrowBlock:(i===hintArrow&&hintTime>0?TH.star:TH.arrow);
    drawArrowStatic(a,cs,gx,gy,col,revealA,shakeOff);
  }

  // Tick down hint timer
  if(hintTime>0){hintTime-=1/60;if(hintTime<=0)hintArrow=-1}

  // Tutorial on level 1 — show after reveal animation completes
  if(level===1&&!isDaily&&!isWeekly&&levelRevealT>=1&&moves===0){
    let tutIdx=-1;
    let aliveCount=0;
    for(let i=0;i<arrows.length;i++){
      if(arrows[i].alive){
        aliveCount++;
        if(tutIdx<0&&canEscape(i))tutIdx=i;
      }
    }
    const totalCount=arrows.length;

    if(tutIdx>=0){
      const pulse=.5+.5*sin(gt*4);
      const ta=arrows[tutIdx];
      const head=ta.cells[ta.cells.length-1];
      const hx=gx+head[1]*cs+cs/2,hy=gy+head[0]*cs+cs/2;

      // Pulse via alpha — much cheaper than shadowBlur on iOS WebKit.
      X.save();
      X.globalAlpha=.45+pulse*.4;
      drawArrowStatic(ta,cs,gx,gy,TH.star,1,0);
      X.restore();

      // Short dashed line (5-6 dashes) + small arrowhead at end
      const dir=ta.dir;
      const lineLen=min(cs*2.5,60); // 5-6 dashes max, never goes past hearts
      const endX=hx+DX[dir]*lineLen,endY=hy+DY[dir]*lineLen;
      X.strokeStyle=TH.star;
      X.lineWidth=2;
      X.globalAlpha=.3+pulse*.4;
      X.setLineDash([6,4]);
      X.beginPath();
      X.moveTo(hx+DX[dir]*cs*.5,hy+DY[dir]*cs*.5);
      X.lineTo(endX,endY);
      X.stroke();
      X.setLineDash([]);
      // Small arrowhead at end of dashed line
      const aLen=8,aW=5;
      X.fillStyle=TH.star;
      X.beginPath();
      X.moveTo(endX+DX[dir]*aLen,endY+DY[dir]*aLen);
      X.lineTo(endX-DY[dir]*aW,endY+DX[dir]*aW);
      X.lineTo(endX+DY[dir]*aW,endY-DX[dir]*aW);
      X.closePath();X.fill();
      X.globalAlpha=1;

      // Text
      txt('Tap this arrow',W/2,76,14,TH.star,'center','700');
      txt('It has a clear path to the edge',W/2,94,11,darkMode?'#aaa':'#666');
    }else if(moves>0&&moves<4){
      txt('Great! Keep going!',W/2,76,14,TH.success,'center','700');
    }
  }

  // Tap detection — find the alive arrow whose nearest cell center is closest
  // to the tap point (within a generous radius).
  if(tapped){
    let bestIdx=-1,bestDist=cs*.85;
    for(let i=0;i<arrows.length;i++){
      const a=arrows[i];
      if(!a.alive)continue;
      for(const[r,c] of a.cells){
        const ax=gx+c*cs+cs/2,ay=gy+r*cs+cs/2;
        const d=sqrt((tapX-ax)*(tapX-ax)+(tapY-ay)*(tapY-ay));
        if(d<bestDist){bestDist=d;bestIdx=i;}
      }
    }
    if(bestIdx>=0){tapArrowByIndex(bestIdx);tapped=false;}
  }

  // Slide animations: whole arrow path traces itself along its own route,
  // then continues straight off-screen past the head.
  for(let i=anims.length-1;i>=0;i--){
    const an=anims[i];
    an.t+=1/60;
    if(an.t>=an.dur){anims.splice(i,1);continue}

    // Use pre-built path cached on anim creation (rebuilt every frame before).
    const path=an.path;

    const p=an.t/an.dur;
    const ep=p<.5?2*p*p:1-2*(1-p)*(1-p); // ease-in-out: smooth start and end
    const tailPos=ep*an.totalDist;
    const headPos=tailPos+an.bodyLen;
    const pts=getPathSegment(path,tailPos,headPos);

    const alpha=p>.85?1-(p-.85)/.15:1;
    drawArrowPolyline(pts,an.cs,an.col,alpha);
  }

  // Shake animations
  for(let i=shakeAnims.length-1;i>=0;i--){
    shakeAnims[i].t+=1/60;
    if(shakeAnims[i].t>=shakeAnims[i].dur)shakeAnims.splice(i,1);
  }

  // Bottom bar: stats row + action buttons row
  const sy1=H*.87;
  txt('Moves: '+moves+'/'+minMoves,W*.22,sy1,11,moves>minMoves?TH.warning:TH.textSec);
  const tm=floor(timer),mm=floor(tm/60),ss=tm%60;
  txt(mm+':'+(ss<10?'0':'')+ss,W*.52,sy1,11,TH.textSec);
  drawCoin(W*.72,sy1,6);
  txt(coins+'',W*.75,sy1,11,TH.star,'left');

  // Action buttons row (Hint + Skip) — wider so labels in any language fit
  // alongside the coin badge without truncation. Layout: label left, coin
  // icon + cost right; both padded inside the pill.
  const by=H*.93,bw=130,bh=34;
  const _drawActionBtn=(bx,label,cost,enabled,color)=>{
    const hv=abs(mx-bx)<bw/2&&abs(my-by)<bh/2;
    X.fillStyle=enabled?(hv?color+'35':color+'20'):TH.btnBg;
    X.beginPath();X.roundRect(bx-bw/2,by-bh/2,bw,bh,bh/2);X.fill();
    X.strokeStyle=enabled?color+'60':TH.border;X.lineWidth=1;
    X.beginPath();X.roundRect(bx-bw/2,by-bh/2,bw,bh,bh/2);X.stroke();
    // Label aligned LEFT inside the button (so coin/cost gets clean space on the right)
    const labelColor=enabled?TH.text:TH.textDim;
    const costColor=enabled?TH.star:TH.textDim;
    txt(label,bx-bw*.18,by,12,labelColor);
    drawCoin(bx+bw*.18,by,6);
    txt(cost+'',bx+bw*.28,by,11,costColor,'left');
    return tapped&&abs(tapX-bx)<bw/2&&abs(tapY-by)<bh/2;
  };
  const canHint=coins>=HINT_COST&&hintTime<=0;
  if(_drawActionBtn(W*.275,t('hint'),HINT_COST,canHint,TH.star)){
    if(canHint)useHint();
    tapped=false;
  }
  const canSkip=coins>=SKIP_COST&&!isDaily;
  if(_drawActionBtn(W*.725,t('skip'),SKIP_COST,canSkip,TH.warning)){
    if(canSkip)skipLevel();
    tapped=false;
  }

  // Update timers
  timer+=1/60;
  totalPlayTime+=1/60;


}

// --- COMPLETE ---
function drawComplete(){
  drawBg();

  // Confetti
  for(let i=confetti.length-1;i>=0;i--){
    const p=confetti[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.rot+=p.rv*.02;p.life-=1/60;
    if(p.life<=0){confetti.splice(i,1);continue}
    X.globalAlpha=clp(p.life,0,1);
    X.fillStyle=p.col;
    X.save();X.translate(p.x,p.y);X.rotate(p.rot);
    if(p.shape===0)X.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz*.6);
    else{X.beginPath();X.arc(0,0,p.sz/2,0,TAU);X.fill()}
    X.restore();
    X.globalAlpha=1;
  }

  // Check mark
  X.strokeStyle=TH.success;X.lineWidth=3;X.lineCap='round';
  X.beginPath();X.arc(W/2,H*.18,28,0,TAU);X.stroke();
  X.beginPath();X.moveTo(W/2-12,H*.18);X.lineTo(W/2-3,H*.18+10);X.lineTo(W/2+14,H*.18-8);X.stroke();

  const title=isWeekly?'WEEKLY DONE':(isDaily?'DAILY COMPLETE':'LEVEL '+level);
  txtP(title,W/2,H*.27,24,TH.text);

  // Stars (skipped for daily/weekly)
  const s=(isDaily||isWeekly)?3:(stars[level]||1);
  if(!isDaily&&!isWeekly)for(let i=0;i<3;i++)drawStar(W/2-30+i*30,H*.34,12,i<s);

  // Stats — 3 columns
  txt('Arrows',W*.22,H*.42,11,TH.textSec);
  txtP(minMoves+'',W*.22,H*.47,18,TH.text);
  txt('Hearts',W*.5,H*.42,11,TH.textSec);
  txtP(undosLeft+'/3',W*.5,H*.47,18,undosLeft===3?TH.success:TH.text);
  txt('Time',W*.78,H*.42,11,TH.textSec);
  const tm=floor(timer),mm=floor(tm/60),ss=tm%60;
  txtP(mm+':'+(ss<10?'0':'')+ss,W*.78,H*.47,18,TH.text);

  if(!isDaily&&!isWeekly&&bestTime>0){
    txt('Best: '+floor(bestTime)+'s',W/2,H*.53,11,TH.textDim);
  }

  // Coins earned
  const coinReward=isWeekly?WEEKLY_REWARD:(isDaily?DAILY_REWARD:5+s*5);
  drawCoin(W/2-22,H*.60,9);
  txtP('+'+coinReward,W/2+8,H*.60,16,TH.star);

  // Buttons — daily/weekly return to menu; normal level goes to next
  if(isDaily||isWeekly){
    if(drawBigBtn('BACK TO MENU',W/2,H*.67,220,50,TH.accent)){
      goto('menu',()=>{isDaily=false;isWeekly=false});
    }
  }else{
    if(drawBigBtn(t('nextLevel'),W/2,H*.67,200,50,TH.accent)){
      showInterstitialAd(); // timed interstitial every 5 min
      goto('play',()=>{level++;save();generateLevel(level)});
    }
    if(drawBtn(t('replay'),W/2,H*.74,140,36)){
      goto('play',()=>{generateLevel(level)});
    }
    if(drawBtn(t('home'),W/2,H*.80,140,36)){goto('menu')}
  }


}

// Per-achievement icon renderer. Categories share a vector glyph so the user
// recognises the achievement type at a glance (level → up-arrow, stars → star,
// perfect → trophy, daily → calendar, streak → flame, no-hint → lightbulb,
// speedrun → bolt). Drawn at logical coords centred on (cx,cy).
function drawAchIcon(id,cx,cy,sz,col){
  const c=col;
  X.save();X.translate(cx,cy);
  X.fillStyle=c;X.strokeStyle=c;X.lineWidth=1.5;X.lineJoin='round';X.lineCap='round';

  if(id.startsWith('lvl_')){
    // Up-arrow stack — three stacked triangles ("levelling up")
    for(let i=0;i<3;i++){
      const ay=sz*.55-i*sz*.45,al=sz*.55-i*sz*.15,a=.4-i*.1;
      X.fillStyle=c+(['','99','66','33'][i]||'');
      X.beginPath();X.moveTo(0,ay-al*.7);X.lineTo(al*.6,ay);X.lineTo(-al*.6,ay);X.closePath();X.fill();
    }
  }else if(id.startsWith('stars_')){
    // Star burst — center star + 4 small satellites
    const star=(s)=>{X.beginPath();
      for(let i=0;i<5;i++){const a1=i*TAU/5-PI/2,a2=a1+TAU/10;
        X.lineTo(cos(a1)*s,sin(a1)*s);X.lineTo(cos(a2)*s*.4,sin(a2)*s*.4)}
      X.closePath();X.fill();};
    X.fillStyle=c;star(sz*.7);
    X.fillStyle=c+'80';for(let i=0;i<4;i++){
      const a=i*PI/2+PI/4;X.save();X.translate(cos(a)*sz*.85,sin(a)*sz*.85);star(sz*.22);X.restore();
    }
  }else if(id.startsWith('perfect_')){
    // Trophy cup — bowl + handles + base
    X.fillStyle=c;
    X.beginPath();X.moveTo(-sz*.5,-sz*.5);X.lineTo(sz*.5,-sz*.5);
    X.lineTo(sz*.4,sz*.1);X.quadraticCurveTo(0,sz*.4,-sz*.4,sz*.1);X.closePath();X.fill();
    // Handles
    X.strokeStyle=c;X.lineWidth=2.5;
    X.beginPath();X.arc(-sz*.5,-sz*.25,sz*.18,PI/2,PI*1.5);X.stroke();
    X.beginPath();X.arc(sz*.5,-sz*.25,sz*.18,-PI/2,PI/2);X.stroke();
    // Base
    X.fillStyle=c;
    X.fillRect(-sz*.08,sz*.1,sz*.16,sz*.25);
    X.fillRect(-sz*.35,sz*.32,sz*.7,sz*.12);
  }else if(id.startsWith('daily_')){
    // Calendar with checkmark
    X.fillStyle=c;
    X.beginPath();X.roundRect(-sz*.55,-sz*.4,sz*1.1,sz*.95,sz*.12);X.fill();
    X.fillStyle='rgba(255,255,255,.85)';
    X.fillRect(-sz*.55,-sz*.4,sz*1.1,sz*.18);
    // Tear-tabs
    X.fillStyle=c;
    X.fillRect(-sz*.35,-sz*.55,sz*.1,sz*.25);
    X.fillRect(sz*.25,-sz*.55,sz*.1,sz*.25);
    // Check
    X.strokeStyle='rgba(255,255,255,.95)';X.lineWidth=2;
    X.beginPath();X.moveTo(-sz*.25,sz*.1);X.lineTo(-sz*.05,sz*.3);X.lineTo(sz*.3,-sz*.1);X.stroke();
  }else if(id.startsWith('streak_')){
    // Flame
    X.fillStyle=c;
    X.beginPath();
    X.moveTo(0,-sz*.6);
    X.bezierCurveTo(sz*.4,-sz*.2,sz*.55,sz*.1,sz*.3,sz*.4);
    X.bezierCurveTo(sz*.15,sz*.55,-sz*.15,sz*.55,-sz*.3,sz*.4);
    X.bezierCurveTo(-sz*.55,sz*.1,-sz*.4,-sz*.2,0,-sz*.6);
    X.fill();
    // Inner flame highlight
    X.fillStyle='rgba(255,255,255,.4)';
    X.beginPath();X.moveTo(0,-sz*.25);
    X.bezierCurveTo(sz*.18,sz*.0,sz*.22,sz*.2,sz*.05,sz*.35);
    X.bezierCurveTo(-sz*.1,sz*.3,-sz*.18,sz*.1,0,-sz*.25);
    X.fill();
  }else if(id.startsWith('no_hint_')){
    // Lightbulb
    X.fillStyle=c;
    X.beginPath();X.arc(0,-sz*.1,sz*.42,0,TAU);X.fill();
    X.fillRect(-sz*.22,sz*.25,sz*.44,sz*.12);
    X.fillRect(-sz*.18,sz*.4,sz*.36,sz*.08);
    X.strokeStyle='rgba(255,255,255,.6)';X.lineWidth=1;
    X.beginPath();X.moveTo(-sz*.15,-sz*.1);X.lineTo(-sz*.15,sz*.2);X.stroke();
    X.beginPath();X.moveTo(sz*.15,-sz*.1);X.lineTo(sz*.15,sz*.2);X.stroke();
  }else if(id==='speedrun'){
    // Lightning bolt
    X.fillStyle=c;
    X.beginPath();
    X.moveTo(sz*.1,-sz*.6);X.lineTo(-sz*.4,sz*.05);X.lineTo(-sz*.05,sz*.1);
    X.lineTo(-sz*.15,sz*.6);X.lineTo(sz*.4,-sz*.05);X.lineTo(sz*.05,-sz*.1);
    X.closePath();X.fill();
  }else{
    // Fallback: filled star
    X.fillStyle=c;
    X.beginPath();
    for(let i=0;i<5;i++){const a1=i*TAU/5-PI/2,a2=a1+TAU/10;
      X.lineTo(cos(a1)*sz*.7,sin(a1)*sz*.7);X.lineTo(cos(a2)*sz*.3,sin(a2)*sz*.3)}
    X.closePath();X.fill();
  }
  X.restore();
}

// --- ACHIEVEMENTS LIST ---
function drawAchievements(){
  drawBg();
  txtP('ACHIEVEMENTS',W/2,62,22,TH.text);
  txt(achUnlockedCount()+' / '+ACHIEVEMENTS.length+' unlocked',W/2,86,12,TH.textSec);

  // Coins top-right
  drawCoin(W-50,64,7);
  txt(coins+'',W-40,64,13,TH.star,'left');

  // List
  const startY=110,cardH=56,cardGap=8,cardW=W-40,cardX=20;
  for(let i=0;i<ACHIEVEMENTS.length;i++){
    const a=ACHIEVEMENTS[i];
    const y=startY+i*(cardH+cardGap);
    if(y+cardH>H-70)break;
    const done=!!achUnlocked[a.id];
    // Card
    X.fillStyle=done?TH.star+'18':TH.cardBg;
    X.beginPath();X.roundRect(cardX,y,cardW,cardH,12);X.fill();
    X.strokeStyle=done?TH.star+'50':TH.border;X.lineWidth=1;
    X.beginPath();X.roundRect(cardX,y,cardW,cardH,12);X.stroke();
    // Icon — vector glyph per category, dimmed when locked
    drawAchIcon(a.id,cardX+28,y+cardH/2,15,done?TH.star:TH.textDim);
    // Name + desc
    txt(a.name,cardX+58,y+19,12,done?TH.text:TH.textSec,'left','700');
    txt(a.desc,cardX+58,y+38,10,done?TH.textSec:TH.textDim,'left');
    // Reward — RIGHT-anchored, "[coin] +N" inside card with 14px right padding.
    // Was overflowing because text was 'left'-aligned starting at cardW+2.
    const rewardStr='+'+a.reward;
    const rightEdge=cardX+cardW-14;
    txt(rewardStr,rightEdge,y+cardH/2,11,done?TH.star:TH.textDim,'right');
    const textApproxW=rewardStr.length*6.5;
    drawCoin(rightEdge-textApproxW-7,y+cardH/2,6);
  }

  if(drawBtn('← '+t('back'),W/2,H-50,140,38)){goto('menu')}

}

// Achievement unlock popup — animates at top of screen
function drawAchPopup(){
  if(!achPopup)return;
  achPopup.t+=1/60;
  const dur=3.5;
  if(achPopup.t>=dur){achPopup=null;return}
  const a=ACHIEVEMENTS.find(x=>x.id===achPopup.id);
  if(!a){achPopup=null;return}
  const p=achPopup.t/dur;
  // Slide in (0-0.2), hold (0.2-0.85), slide out (0.85-1)
  let offY;
  if(p<.15)offY=-80+(p/.15)*80;
  else if(p>.85)offY=-((p-.85)/.15)*80;
  else offY=0;

  // py is safe-area aware — clears the Dynamic Island on every iPhone.
  const pw=320,ph=58,px=(W-pw)/2,py=Math.max(60,safeTop+20)+offY;
  // Subtle drop shadow via stacked fills (cheap) instead of shadowBlur
  // (expensive every frame on iOS WebKit).
  X.fillStyle='rgba(0,0,0,.10)';
  X.beginPath();X.roundRect(px,py+3,pw,ph,14);X.fill();
  X.fillStyle='rgba(0,0,0,.06)';
  X.beginPath();X.roundRect(px,py+6,pw,ph,14);X.fill();
  X.fillStyle=TH.surface;
  X.beginPath();X.roundRect(px,py,pw,ph,14);X.fill();
  glass(px,py,pw,ph,14);
  X.strokeStyle=TH.star+'80';X.lineWidth=2;
  X.beginPath();X.roundRect(px,py,pw,ph,14);X.stroke();
  // Star icon
  drawStar(px+28,py+ph/2,14,true);
  // Text
  txt('ACHIEVEMENT UNLOCKED',px+50,py+17,8,TH.star,'left','700');
  txtP(a.name,px+50,py+36,12,TH.text,'left');
  // Reward — inside the box
  drawCoin(px+pw-40,py+ph/2,7);
  txt('+'+a.reward,px+pw-28,py+ph/2,10,TH.star,'left');
}

// --- GAME OVER ---
function drawGameOver(){
  drawBg();

  // Broken heart icon
  X.fillStyle='#e05555';
  X.save();X.translate(W/2,H*.22);X.scale(3.5,3.5);
  X.beginPath();
  X.moveTo(0,3);X.bezierCurveTo(-5,-2,-9,-1,-9,3);X.bezierCurveTo(-9,8,0,12,0,12);
  X.bezierCurveTo(0,12,9,8,9,3);X.bezierCurveTo(9,-1,5,-2,0,3);
  X.fill();
  // Crack through middle
  X.strokeStyle=TH.bg;X.lineWidth=1.2;X.lineCap='round';
  X.beginPath();X.moveTo(-1,-2);X.lineTo(1,3);X.lineTo(-1,6);X.lineTo(1,10);X.stroke();
  X.restore();

  txtP(t('gameOver'),W/2,H*.38,28,TH.text);
  txt(t('outOfHearts'),W/2,H*.44,13,TH.textSec);

  // Buttons
  if(drawBigBtn(t('retry'),W/2,H*.50,200,48,TH.accent)){
    showInterstitialAd(); // show ad between retries
    goto('play',()=>{generateLevel(level)});
  }

  // Continue for coins
  const canContinue=coins>=CONTINUE_COST;
  const cby=H*.58,cbw=220,cbh=42;
  const cbhv=abs(mx-W/2)<cbw/2&&abs(my-cby)<cbh/2;
  X.fillStyle=canContinue?(cbhv?TH.star+'35':TH.star+'20'):TH.btnBg;
  X.beginPath();X.roundRect(W/2-cbw/2,cby-cbh/2,cbw,cbh,cbh/2);X.fill();
  glass(W/2-cbw/2,cby-cbh/2,cbw,cbh,cbh/2);
  X.strokeStyle=canContinue?TH.star+'70':TH.border;X.lineWidth=1.5;
  X.beginPath();X.roundRect(W/2-cbw/2,cby-cbh/2,cbw,cbh,cbh/2);X.stroke();
  txt(t('continueBtn'),W/2-28,cby,14,canContinue?TH.text:TH.textDim);
  drawCoin(W/2+22,cby,7);
  txt(CONTINUE_COST+'',W/2+33,cby,12,canContinue?TH.star:TH.textDim,'left');
  if(tapped&&abs(tapX-W/2)<cbw/2&&abs(tapY-cby)<cbh/2){
    if(canContinue)continueFromGameover();
    tapped=false;
  }

  // Continue by watching ad (FREE alternative)
  const aby=H*.66;
  if(drawBtn('CONTINUE (Watch Ad)',W/2,aby,220,42,TH.success)){
    showRewardedAd(()=>{undosLeft=3;S='play'});
  }

  // Watch ad for coins (when low on coins)
  if(coins<CONTINUE_COST){
    if(drawBtn('GET '+AD_COIN_REWARD+' COINS (Ad)',W/2,H*.73,220,38,TH.star)){
      showRewardedAd(()=>{coins+=AD_COIN_REWARD;totalCoinsEarned+=AD_COIN_REWARD;save();spawnFloater(W/2,H*.73,'+'+AD_COIN_REWARD)});
    }
  }

  if(drawBtn(t('home'),W/2,H*.81,140,38)){goto('menu')}

  // Coins display top-right
  drawCoin(W-50,64,7);
  txt(coins+'',W-40,64,13,TH.star,'left');


}

// --- SETTINGS ---
let resetConfirm=false;
function drawSettings(){
  drawBg();
  txtP(t('settings'),W/2,62,22,TH.text);

  // Language — opens picker modal (drawLangPicker draws it on top after the
  // rest of the screen is rendered, so taps land on the modal not the buttons
  // below it)
  const curLang=LANGS.find(l=>l.code===lang)||LANGS[0];
  if(drawBtn(t('language')+': '+curLang.name,W/2,110,260,44)){
    langPickerOpen=true;
  }

  // Sound
  if(drawBtn(t('sound')+': '+(sndOn?t('on'):t('off')),W/2,165,260,44)){
    sndOn=!sndOn;localStorage.setItem('ae_sound',sndOn?'1':'0');
  }
  // Dark mode
  if(drawBtn(t('theme')+': '+(darkMode?t('themeDark'):t('themeLight')),W/2,220,260,44)){
    darkMode=!darkMode;localStorage.setItem('ae_theme',darkMode?'dark':'light');applyTheme();
  }
  // Watch Ad for Coins
  if(drawBtn(t('watchAd')+' → +'+AD_COIN_REWARD+' '+t('coins'),W/2,295,260,44,TH.star)){
    showRewardedAd(()=>{coins+=AD_COIN_REWARD;totalCoinsEarned+=AD_COIN_REWARD;save();spawnFloater(W/2,295,'+'+AD_COIN_REWARD)});
  }

  // Reset — two-tap confirmation (no native dialogs)
  if(!resetConfirm){
    if(drawBtn(t('resetProgress'),W/2,425,200,44,TH.warning)){resetConfirm=true}
  }else{
    txt(t('areYouSure'),W/2,415,13,TH.warning);
    if(drawBtn(t('yesReset'),W/2-60,455,110,40,TH.arrowBlock)){
      // Reset wipes PROGRESS keys only — language, sound, theme preferences
      // and system keys (lasterror, lastreject) are preserved.
      // KEY NAMES MUST MATCH save() in line ~386 — previous list used wrong
      // names (ae_perfect vs ae_perfects, ae_streak vs ae_streakdays, etc.)
      // and silently left progress in storage.
      const PROGRESS_KEYS=['ae_level','ae_maxlevel','ae_coins','ae_stars','ae_ach',
        'ae_total_coins','ae_streakdays','ae_lastday','ae_perfects','ae_dailies',
        'ae_nohint','ae_fastest','ae_playtime','ae_noads'];
      for(const k of PROGRESS_KEYS)localStorage.removeItem(k);
      // Also sweep dynamic keys: ae_best_<level>, ae_daily_<seed>, ae_weekly_<seed>
      for(let i=localStorage.length-1;i>=0;i--){
        const k=localStorage.key(i);
        if(k&&(k.startsWith('ae_best_')||k.startsWith('ae_daily_')||k.startsWith('ae_weekly_')))
          localStorage.removeItem(k);
      }
      level=1;maxLevel=1;coins=60;stars={};totalStars=0;
      achUnlocked={};totalPerfect=0;totalDailies=0;noHintCount=0;
      totalCoinsEarned=0;streakDays=0;totalPlayTime=0;fastestLevel=99999;
      lastPlayDay=0;hintUsedThisLevel=false;
      // adsRemoved is now a const — nothing to reset.
      resetConfirm=false;save();
      goto('menu');
    }
    if(drawBtn(t('cancel'),W/2+60,455,110,40)){resetConfirm=false}
  }

  if(drawBtn('← '+t('back'),W/2,H-60,140,38)){resetConfirm=false;goto('menu')}

}

// --- LANGUAGE PICKER MODAL ---
// Shown over any screen; absorbs all taps until the user picks a language or
// taps outside the panel. Lists every language in LANGS, current one marked.
function drawLangPicker(){
  // Dim backdrop
  X.fillStyle='rgba(0,0,0,.5)';X.fillRect(0,0,W,H);
  // Panel — adapts to theme: cream paper in light mode, dark navy in dark.
  // Inner row colors derive from TH so they stay readable in both modes.
  const panelW=300,panelH=Math.min(LANGS.length*52+90,H-100);
  const px=(W-panelW)/2, py=(H-panelH)/2;
  const r=22;
  const panelBg=darkMode?'#2a2a4a':'#ffffff';
  const titleCol=darkMode?'#f0eee8':'#2a2a2a';
  const rowText=darkMode?'#e8e6e0':'#2a2a2a';
  const rowSel=TH.accent;
  const rowSelBg=darkMode?'rgba(226,179,90,.20)':'rgba(200,144,48,.16)';
  const rowHover=darkMode?'rgba(255,255,255,.06)':'rgba(0,0,0,.05)';
  X.fillStyle=panelBg;
  X.beginPath();X.roundRect(px,py,panelW,panelH,r);X.fill();
  X.strokeStyle=darkMode?'rgba(255,255,255,.10)':'rgba(0,0,0,.08)';X.lineWidth=1;
  X.beginPath();X.roundRect(px,py,panelW,panelH,r);X.stroke();
  txtP(t('language'),W/2,py+34,18,titleCol);
  const rowH=46,startY=py+62,maxRows=Math.floor((panelH-90)/rowH);
  for(let i=0;i<Math.min(LANGS.length,maxRows);i++){
    const L=LANGS[i];
    const ry=startY+i*rowH;
    const sel=L.code===lang;
    const hv=mx>px+12&&mx<px+panelW-12&&abs(my-(ry+rowH/2))<rowH/2;
    if(sel||hv){
      X.fillStyle=sel?rowSelBg:rowHover;
      X.beginPath();X.roundRect(px+12,ry,panelW-24,rowH-4,12);X.fill();
    }
    txt(L.name,W/2,ry+rowH/2,15,sel?rowSel:rowText);
    if(sel){txt('✓',px+panelW-30,ry+rowH/2,16,rowSel,'right')}
    if(tapped&&abs(tapX-W/2)<panelW/2-12&&abs(tapY-(ry+rowH/2))<rowH/2){
      lang=L.code;localStorage.setItem('ae_lang',lang);
      langPickerOpen=false;sfx.tap();haptic(8);tapped=false;return;
    }
  }
  // Close (taps outside panel) — checked LAST so row taps win
  if(tapped&&(tapX<px||tapX>px+panelW||tapY<py||tapY>py+panelH)){
    langPickerOpen=false;tapped=false;
  }
}

// --- LEVELS ---
// Paginated: 25 levels per page (5×5 grid). Unlimited pages. Each card shows
// the level number, stars earned, and lock state.
const LEVELS_PER_PAGE=25;
function drawLevels(){
  drawBg();

  // Header
  txtP(t('levels'),W/2,62,22,TH.text);

  const fromLv=levelsPage*LEVELS_PER_PAGE+1;
  const toLv=fromLv+LEVELS_PER_PAGE-1;
  txt(fromLv+' – '+toLv,W/2,72,12,TH.textSec);

  // Coins display top-right
  drawCoin(W-50,64,7);
  txt(coins+'',W-40,64,13,TH.star,'left');

  // Grid of 25 level cards (5×5)
  const cols=5,rows=5;
  const cellW=62,cellH=66;
  const gridW=cols*cellW,gridH=rows*cellH;
  const startX=(W-gridW)/2;
  const startY=100;

  for(let i=0;i<cols*rows;i++){
    const lv=fromLv+i;
    const r=floor(i/cols),c=i%cols;
    const x=startX+c*cellW+cellW/2;
    const y=startY+r*cellH+cellH/2;

    const unlocked=lv<=maxLevel;
    const current=lv===level;
    const done=stars[lv]>0;
    const s=stars[lv]||0;
    const hv=abs(mx-x)<26&&abs(my-y)<30;

    // Card background
    const cardW=52,cardH=56;
    if(current){
      X.fillStyle=TH.accent+'30';
    }else if(done){
      X.fillStyle=TH.star+'18';
    }else if(unlocked){
      X.fillStyle=hv?TH.btnHover:TH.btnBg;
    }else{
      X.fillStyle=TH.cardBg;
    }
    X.beginPath();X.roundRect(x-cardW/2,y-cardH/2,cardW,cardH,10);X.fill();
    glass(x-cardW/2,y-cardH/2,cardW,cardH,10);
    // Border
    X.strokeStyle=current?TH.accent:(done?TH.star+'60':TH.border);
    X.lineWidth=current?2:1;
    X.beginPath();X.roundRect(x-cardW/2,y-cardH/2,cardW,cardH,10);X.stroke();

    // Level number
    txtP(lv+'',x,y-8,unlocked?15:13,unlocked?TH.text:TH.textDim);

    // Stars (real star shapes)
    for(let j=0;j<3;j++){
      const sx=x-10+j*10,sy=y+14;
      drawStar(sx,sy,4,done&&j<s);
    }

    // Lock indicator — small dim bar under the level number for locked levels
    if(!unlocked){
      X.strokeStyle=TH.textDim;X.lineWidth=1.2;X.lineCap='round';
      X.beginPath();X.moveTo(x-7,y+4);X.lineTo(x+7,y+4);X.stroke();
    }

    // Tap
    if(tapped&&abs(tapX-x)<cardW/2&&abs(tapY-y)<cardH/2&&unlocked){
      sfx.tap();tapped=false;
      goto('play',()=>{level=lv;isDaily=false;isWeekly=false;generateLevel(level)});
      return;
    }
  }

  // Pagination controls
  const pagY=H-110;
  const hasPrev=levelsPage>0;
  const hasNext=true; // unlimited levels
  if(hasPrev){
    if(drawBtn('← Prev',W*.28,pagY,100,36)){levelsPage--}
  }
  txt('Page '+(levelsPage+1),W/2,pagY,12,TH.textSec);
  if(hasNext){
    if(drawBtn('Next →',W*.72,pagY,100,36)){levelsPage++}
  }

  // Back to menu
  if(drawBtn('← '+t('back'),W/2,H-55,140,36)){goto('menu')}

}

// ================================================================
//  MAIN LOOP
// ================================================================
let _lastT=0;
let fadingOut=false;
function goto(newState,action){
  if(fadingOut)return;
  // Reset transient screen-local UI flags when leaving screens — avoids the
  // settings reset-confirm row appearing already-toggled when you come back.
  if(newState!=='settings')resetConfirm=false;
  fadingOut=true;
  pendingState={state:newState,action:action||null};
}
function loop(t){
  const dt=min((t-_lastT)/1000,.05);_lastT=t;gt+=dt;

  // Fade transition: fade-out then apply pending state then fade-in
  if(fadingOut){
    fadeAlpha=min(1,fadeAlpha+dt*5);
    if(fadeAlpha>=1){
      if(pendingState){
        if(pendingState.action)pendingState.action();
        S=pendingState.state;
        pendingState=null;
      }
      fadingOut=false;
    }
  }else if(fadeAlpha>0){
    fadeAlpha=max(0,fadeAlpha-dt*4);
  }

  // Render
  if(S==='menu')drawMenu();
  else if(S==='play')drawPlay();
  else if(S==='complete')drawComplete();
  else if(S==='gameover')drawGameOver();
  else if(S==='settings')drawSettings();
  else if(S==='levels')drawLevels();
  else if(S==='achievements')drawAchievements();
  else if(S==='stats')drawStats();

  // Global: floating coin popups + achievement unlock popup
  drawFloaters();
  drawAchPopup();

  // Top-most overlays (block all underlying input)
  if(langPickerOpen)drawLangPicker();

  // Screen fade overlay
  if(fadeAlpha>0){
    X.fillStyle=darkMode?`rgba(26,26,46,${fadeAlpha})`:`rgba(245,242,237,${fadeAlpha})`;
    X.fillRect(0,0,W,H);
  }

  // Final tap reset — so modals/overlays drawn AFTER screen draws still get
  // a chance to handle the tap. Individual draw functions clearing `tapped`
  // would consume it before drawLangPicker runs.
  tapped=false;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Register service worker for offline play + PWA install — but ONLY when
// running as a real web page, NOT inside the Capacitor WebView. Capacitor
// serves assets from the app bundle; a SW would intercept those fetches and
// can serve stale content across app updates (we burned a build on this).
if('serviceWorker' in navigator && typeof Capacitor==='undefined'){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
})(); // end IIFE
</script>
